<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vision</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }
    #app {
      width: 240px;
      height: 282px;
      display: flex;
      flex-direction: column;
    }

    /* ── Viewfinder ── */
    #viewfinder {
      position: relative;
      width: 240px;
      height: 160px;
      background: #111;
      flex-shrink: 0;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #canvas { display: none; }

    /* Freeze overlay shown while waiting for LLM */
    #freeze {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }

    /* ── Status bar ── */
    #status {
      height: 16px;
      line-height: 16px;
      padding: 0 5px;
      font-size: 10px;
      background: #111;
      color: #0f0;
      border-top: 1px solid #222;
      border-bottom: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    /* ── Response area ── */
    #response {
      flex: 1;
      padding: 5px 6px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.45;
      color: #ddd;
      background: #000;
      word-break: break-word;
    }

    /* ── Capture button ── */
    #capture-btn {
      width: 100%;
      height: 28px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-top: 1px solid #444;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
      letter-spacing: 1px;
    }
    #capture-btn:active,
    #capture-btn.busy { background: #2a2a2a; color: #888; }
  </style>
</head>
<body>
<div id="app">
  <div id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" width="160" height="120"></canvas>
    <img id="freeze" alt="">
  </div>
  <div id="status">starting...</div>
  <div id="response">Point camera and press PTT or CAPTURE.</div>
  <button id="capture-btn">[ CAPTURE ]</button>
</div>

<script>
  const video   = document.getElementById('video');
  const canvas  = document.getElementById('canvas');
  const freeze  = document.getElementById('freeze');
  const status  = document.getElementById('status');
  const resp    = document.getElementById('response');
  const btn     = document.getElementById('capture-btn');
  const ctx     = canvas.getContext('2d');

  let stream = null;
  let busy   = false;

  // ── Init camera ────────────────────────────────────────────────
  async function initCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      });
      video.srcObject = stream;
      setStatus('ready — PTT or tap to capture');
    } catch (e) {
      setStatus('camera error: ' + e.message);
    }
  }

  // ── Capture & send ─────────────────────────────────────────────
  function captureAndSend() {
    if (busy || !stream) return;
    busy = true;
    setBusy(true);

    // Draw frame at reduced resolution to keep payload small
    ctx.drawImage(video, 0, 0, 160, 120);
    const base64 = canvas.toDataURL('image/jpeg', 0.5);
    const kb     = Math.round(base64.length / 1024);

    // Show frozen frame
    freeze.src     = base64;
    freeze.style.display = 'block';

    setStatus('sending (' + kb + ' KB)...');
    resp.textContent = '';

    // Try three different prompt formats so we can see
    // which (if any) the underlying model responds to:
    //
    //  FORMAT A — data URI inline in text
    //  FORMAT B — JSON-style structured hint
    //  FORMAT C — just ask what it sees (control, no image)
    //
    // Sending FORMAT A first. If nothing useful comes back,
    // we can swap to B or C.

    const message =
      'You are a vision assistant. Describe what is in this image.\n' +
      'IMAGE_DATA_URI: ' + base64;

    try {
      window.onPluginMessage = handleResponse;
      PluginMessageHandler.postMessage(JSON.stringify({
        message: message,
        useLLM: true,
        wantsR1Response: false
      }));
    } catch (e) {
      setStatus('SDK error: ' + e.message);
      reset();
    }
  }

  // ── Handle LLM response ────────────────────────────────────────
  function handleResponse(data) {
    let text = '';
    if (data && data.message)      text = data.message;
    else if (data && data.data)    text = data.data;
    else                           text = JSON.stringify(data);

    resp.textContent = text;

    // Also log raw so we can see any hidden fields
    console.log('raw response:', JSON.stringify(data));
    setStatus('done — ' + text.length + ' chars');
    reset();
  }

  function reset() {
    busy = false;
    setBusy(false);
    // Keep freeze visible so user can compare image to description
    // Tap capture again to resume live view
  }

  function setBusy(b) {
    btn.classList.toggle('busy', b);
    btn.textContent = b ? '[ ... ]' : '[ CAPTURE ]';
  }

  function setStatus(msg) {
    status.textContent = msg;
  }

  // Resume live view on next capture
  btn.addEventListener('click', () => {
    if (!busy) {
      freeze.style.display = 'none';
      captureAndSend();
    }
  });

  // PTT button
  window.addEventListener('sideClick',     () => { freeze.style.display = 'none'; captureAndSend(); });
  window.addEventListener('longPressStart',() => { freeze.style.display = 'none'; captureAndSend(); });

  initCamera();
</script>
</body>
</html>
