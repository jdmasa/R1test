<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Voice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #0a0a0a;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }
    #app {
      width: 240px;
      height: 282px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Big PTT indicator ── */
    #ptt-ring {
      margin-top: 20px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.1s, box-shadow 0.1s;
    }
    #ptt-ring.listening {
      border-color: #f44;
      box-shadow: 0 0 16px #f44a;
    }
    #ptt-ring.thinking {
      border-color: #4af;
      box-shadow: 0 0 16px #4afa;
    }
    #ptt-icon {
      font-size: 32px;
    }

    /* ── State label ── */
    #state-label {
      margin-top: 8px;
      font-size: 10px;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Transcript ── */
    #transcript {
      margin-top: 10px;
      width: 220px;
      min-height: 28px;
      padding: 4px 6px;
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      color: #ff0;
      font-size: 10px;
      line-height: 1.4;
      word-break: break-word;
    }

    /* ── Response ── */
    #response {
      margin-top: 6px;
      width: 220px;
      flex: 1;
      padding: 5px 6px;
      overflow-y: auto;
      background: #000;
      border: 1px solid #222;
      border-radius: 4px;
      color: #ddd;
      font-size: 11px;
      line-height: 1.45;
      word-break: break-word;
    }

    /* ── Hold button ── */
    #hold-btn {
      width: 100%;
      height: 30px;
      background: #1a1a1a;
      color: #888;
      border: none;
      border-top: 1px solid #333;
      font-family: monospace;
      font-size: 10px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 6px;
    }
    #hold-btn.active {
      background: #2a0000;
      color: #f44;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="ptt-ring"><span id="ptt-icon">🎙</span></div>
  <div id="state-label">hold PTT to speak</div>
  <div id="transcript">—</div>
  <div id="response">Waiting for your voice...</div>
  <button id="hold-btn">[ HOLD TO TALK ]</button>
</div>

<script>
  const ring        = document.getElementById('ptt-ring');
  const stateLabel  = document.getElementById('state-label');
  const transcript  = document.getElementById('transcript');
  const response    = document.getElementById('response');
  const holdBtn     = document.getElementById('hold-btn');

  const SR = window.webkitSpeechRecognition;
  let recognition   = null;
  let lastTranscript = '';
  let state         = 'idle'; // idle | listening | thinking

  // ── Pre-warm mic permission ────────────────────────────────────
  async function warmMic() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      stream.getTracks().forEach(t => t.stop()); // just needed for permission
      setState('idle');
      setLabel('hold PTT to speak');
    } catch(e) {
      setLabel('mic error: ' + e.message);
    }
  }

  // ── Speech Recognition setup ───────────────────────────────────
  function buildRecognition() {
    const r = new SR();
    r.lang             = 'en-US';
    r.interimResults   = true;
    r.continuous       = false;
    r.maxAlternatives  = 1;

    r.onresult = function(e) {
      let interim = '';
      let final   = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t;
        else interim += t;
      }
      transcript.textContent = final || interim || '...';
      if (final) lastTranscript = final;
    };

    r.onerror = function(e) {
      if (e.error === 'no-speech') {
        setLabel('no speech detected');
      } else {
        setLabel('SR error: ' + e.error);
      }
      setState('idle');
    };

    r.onend = function() {
      // Only send if we were still in listening state (not already thinking)
      if (state === 'listening') {
        const text = lastTranscript || transcript.textContent;
        if (text && text !== '—' && text !== '...') {
          sendToLLM(text);
        } else {
          setState('idle');
          setLabel('hold PTT to speak');
        }
      }
    };

    return r;
  }

  // ── Start listening ────────────────────────────────────────────
  function startListening() {
    if (state !== 'idle') return;
    lastTranscript = '';
    transcript.textContent = '...';
    setState('listening');
    setLabel('listening...');
    holdBtn.classList.add('active');
    holdBtn.textContent = '[ RELEASE TO SEND ]';

    recognition = buildRecognition();
    try {
      recognition.start();
    } catch(e) {
      setLabel('SR start error: ' + e.message);
      setState('idle');
    }
  }

  // ── Stop listening ─────────────────────────────────────────────
  function stopListening() {
    holdBtn.classList.remove('active');
    holdBtn.textContent = '[ HOLD TO TALK ]';
    if (recognition && state === 'listening') {
      try { recognition.stop(); } catch(_) {}
    }
  }

  // ── Send to LLM ────────────────────────────────────────────────
  function sendToLLM(text) {
    setState('thinking');
    setLabel('thinking...');
    response.textContent = '';

    window.onPluginMessage = function(data) {
      let reply = '';
      if (data && data.message)   reply = data.message;
      else if (data && data.data) reply = data.data;
      else                        reply = JSON.stringify(data);

      response.textContent = reply;
      setState('idle');
      setLabel('hold PTT to speak');
    };

    try {
      PluginMessageHandler.postMessage(JSON.stringify({
        message: text,
        useLLM: true,
        wantsR1Response: false
      }));
    } catch(e) {
      response.textContent = 'SDK error: ' + e.message;
      setState('idle');
      setLabel('hold PTT to speak');
    }
  }

  // ── UI helpers ─────────────────────────────────────────────────
  function setState(s) {
    state = s;
    ring.className = '';
    if (s === 'listening') { ring.classList.add('listening'); ptt-icon.textContent = '🔴'; }
    else if (s === 'thinking') { ring.classList.add('thinking'); document.getElementById('ptt-icon').textContent = '💭'; }
    else { document.getElementById('ptt-icon').textContent = '🎙'; }
  }

  function setLabel(msg) {
    stateLabel.textContent = msg;
  }

  // ── Hardware PTT (side button) ─────────────────────────────────
  window.addEventListener('longPressStart', startListening);
  window.addEventListener('longPressEnd',   stopListening);
  window.addEventListener('sideClick',      () => {
    if (state === 'idle')      startListening();
    else if (state === 'listening') stopListening();
  });

  // ── On-screen hold button ──────────────────────────────────────
  holdBtn.addEventListener('mousedown',  startListening);
  holdBtn.addEventListener('mouseup',    stopListening);
  holdBtn.addEventListener('touchstart', function(e) { e.preventDefault(); startListening(); });
  holdBtn.addEventListener('touchend',   function(e) { e.preventDefault(); stopListening(); });

  // ── Init ───────────────────────────────────────────────────────
  setLabel('requesting mic...');
  warmMic();
</script>
</body>
</html>
