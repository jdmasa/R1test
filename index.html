<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Audio Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
    }
    #log {
      height: 210px;
      padding: 5px;
      overflow-y: auto;
      word-break: break-all;
    }
    .line { margin-bottom: 2px; }
    .err  { color: #f44; }
    .ok   { color: #0f0; }
    .info { color: #ff0; }
    #status {
      height: 14px;
      line-height: 14px;
      padding: 0 5px;
      background: #111;
      color: #0ff;
      border-top: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
    }
    button {
      display: block;
      width: 100%;
      height: 29px;
      background: #111;
      color: #fff;
      border: none;
      border-top: 1px solid #444;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    button.active { background: #2a0000; color: #f44; }
  </style>
</head>
<body>
  <div id="log"></div>
  <div id="status">starting...</div>
  <button id="btn">[ HOLD TO RECORD ]</button>

  <script>
    window.onerror = function(msg, src, line) {
      log('JS ERR: ' + msg + ' L' + line, 'err');
    };

    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');

    function log(msg, type) {
      const d = document.getElementById('log');
      const el = document.createElement('div');
      el.className = 'line ' + (type || 'info');
      el.textContent = msg;
      d.appendChild(el);
      d.scrollTop = d.scrollHeight;
    }
    function setStatus(s) { status.textContent = s; }

    log('page OK', 'ok');

    let micStream   = null;
    let recorder    = null;
    let chunks      = [];
    let recording   = false;

    // ── Pre-warm mic ───────────────────────────────────────────
    async function warmMic() {
      log('requesting mic...', 'info');
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        log('mic OK', 'ok');
        setStatus('ready — hold PTT or button to record');
      } catch(e) {
        log('mic error: ' + e.name, 'err');
        setStatus('mic failed');
      }
    }

    // ── Start recording ────────────────────────────────────────
    function startRecording() {
      if (recording || !micStream) return;
      recording = true;
      chunks = [];
      btn.classList.add('active');
      btn.textContent = '[ RELEASE TO SEND ]';
      setStatus('recording...');
      log('recording started', 'info');

      try {
        recorder = new MediaRecorder(micStream, { mimeType: 'audio/webm;codecs=opus' });
        recorder.ondataavailable = function(e) {
          if (e.data.size > 0) chunks.push(e.data);
        };
        recorder.onstop = onRecordingStop;
        recorder.start(100); // collect chunks every 100ms
        log('MediaRecorder started', 'ok');
        // Auto-stop after 2s to keep payload small
        setTimeout(function() { if (recording) stopRecording(); }, 2000);
      } catch(e) {
        log('recorder error: ' + e.message, 'err');
        recording = false;
        btn.classList.remove('active');
        btn.textContent = '[ HOLD TO RECORD ]';
      }
    }

    // ── Stop recording ─────────────────────────────────────────
    function stopRecording() {
      if (!recording || !recorder) return;
      log('stopping...', 'info');
      recorder.stop();
      recording = false;
      btn.classList.remove('active');
      btn.textContent = '[ HOLD TO RECORD ]';
      setStatus('processing...');
    }

    // ── On recording complete → convert → send ─────────────────
    function onRecordingStop() {
      const blob = new Blob(chunks, { type: 'audio/webm;codecs=opus' });
      const kb   = Math.round(blob.size / 1024);
      log('blob: ' + kb + 'KB', 'ok');

      // Convert blob to base64
      const reader = new FileReader();
      reader.onloadend = function() {
        const base64 = reader.result; // data:audio/webm;codecs=opus;base64,...
        log('base64 ready: ' + Math.round(base64.length / 1024) + 'KB', 'ok');
        sendToLLM(base64);
      };
      reader.onerror = function() {
        log('FileReader error', 'err');
      };
      reader.readAsDataURL(blob);
    }

    // ── Send to LLM ────────────────────────────────────────────
    function sendToLLM(base64Audio) {
      setStatus('sending to LLM...');
      log('sending audio to LLM...', 'info');

      const message =
        'I am sending you an audio recording. ' +
        'Please transcribe exactly what is spoken in this audio. ' +
        'If you cannot process audio, respond with CANNOT_PROCESS_AUDIO. ' +
        'AUDIO_DATA_URI: ' + base64Audio;

      window.onPluginMessage = function(data) {
        const reply = (data && data.message) ? data.message
                    : (data && data.data)    ? data.data
                    : JSON.stringify(data);

        log('response: ' + reply.slice(0, 120), 'ok');

        if (reply.includes('CANNOT_PROCESS_AUDIO')) {
          setStatus('audio not supported by LLM');
        } else {
          setStatus('transcription: ' + reply.slice(0, 30));
        }
      };

      const payload = JSON.stringify({
        message: message,
        useLLM: true,
        wantsR1Response: false
      });
      log('payload size: ' + Math.round(payload.length / 1024) + 'KB', payload.length < 15000 ? 'ok' : 'err');
      try {
        PluginMessageHandler.postMessage(payload);
        log('sent', 'ok');
      } catch(e) {
        log('LLM err: ' + e.message, 'err');
        setStatus('LLM error');
      }
    }

    // ── Button events ──────────────────────────────────────────
    btn.addEventListener('mousedown',  startRecording);
    btn.addEventListener('mouseup',    stopRecording);
    btn.addEventListener('touchstart', function(e) { e.preventDefault(); startRecording(); });
    btn.addEventListener('touchend',   function(e) { e.preventDefault(); stopRecording(); });

    // PTT
    window.addEventListener('longPressStart', startRecording);
    window.addEventListener('longPressEnd',   stopRecording);
    window.addEventListener('sideClick', function() {
      if (!recording) startRecording(); else stopRecording();
    });

    warmMic();
  </script>
</body>
</html>
