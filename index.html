<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Voice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
    }
    #log {
      height: 200px;
      padding: 5px;
      overflow-y: auto;
      word-break: break-all;
    }
    .line { margin-bottom: 2px; }
    .err  { color: #f44; }
    .ok   { color: #0f0; }
    .info { color: #ff0; }
    #status {
      height: 14px;
      line-height: 14px;
      padding: 0 5px;
      background: #111;
      color: #0ff;
      border-top: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
    }
    button {
      display: block;
      width: 100%;
      height: 34px;
      background: #111;
      color: #fff;
      border: none;
      border-top: 1px solid #444;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    button.active { background: #2a0000; color: #f44; }
    button:active { background: #222; }
  </style>
</head>
<body>
  <div id="log"></div>
  <div id="status">starting...</div>
  <button id="btn">[ HOLD TO TALK ]</button>

  <script>
    // Catch ALL JS errors and show them
    window.onerror = function(msg, src, line, col, err) {
      log('JS ERROR: ' + msg + ' (line ' + line + ')', 'err');
      return false;
    };

    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');

    function log(msg, type) {
      const d = document.getElementById('log');
      const el = document.createElement('div');
      el.className = 'line ' + (type || 'info');
      el.textContent = msg;
      d.appendChild(el);
      d.scrollTop = d.scrollHeight;
    }

    function setStatus(s) { status.textContent = s; }

    log('page OK', 'ok');

    // ── 1. Check SR ────────────────────────────────────────────
    const SR = window.webkitSpeechRecognition || window.SpeechRecognition;
    log('SR available: ' + !!SR, SR ? 'ok' : 'err');

    // ── 2. Pre-warm mic ────────────────────────────────────────
    async function warmMic() {
      log('requesting mic...', 'info');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        log('mic OK', 'ok');
        stream.getTracks().forEach(t => t.stop());
        setStatus('ready — hold button or PTT');
      } catch(e) {
        log('mic error: ' + e.name + ' ' + e.message, 'err');
        setStatus('mic failed');
      }
    }

    // ── 3. SR instance ─────────────────────────────────────────
    let recognition = null;
    let listening   = false;

    function startSR() {
      if (listening) return;
      if (!SR) { log('no SR API', 'err'); return; }

      log('building SR...', 'info');
      listening = true;
      btn.classList.add('active');
      btn.textContent = '[ RELEASE TO SEND ]';
      setStatus('listening...');

      try {
        recognition = new SR();
        recognition.lang           = 'en-US';
        recognition.interimResults = true;
        recognition.continuous     = false;
        recognition.maxAlternatives = 1;

        recognition.onstart  = () => log('SR.onstart fired', 'ok');
        recognition.onaudiostart = () => log('audio start', 'ok');
        recognition.onspeechstart = () => log('speech start', 'ok');

        recognition.onresult = function(e) {
          let text = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            text += e.results[i][0].transcript;
          }
          log('heard: ' + text, 'ok');
          setStatus(text);
        };

        recognition.onerror = function(e) {
          log('SR error: ' + e.error + ' / ' + (e.message || ''), 'err');
          listening = false;
          btn.classList.remove('active');
          btn.textContent = '[ HOLD TO TALK ]';
          setStatus('error: ' + e.error);
        };

        recognition.onend = function() {
          log('SR ended', 'info');
          listening = false;
          btn.classList.remove('active');
          btn.textContent = '[ HOLD TO TALK ]';
          // Get last status text as transcript and send
          const text = status.textContent;
          if (text && !text.startsWith('error') && text !== 'listening...') {
            sendToLLM(text);
          }
        };

        recognition.start();
        log('SR.start() called', 'ok');
      } catch(e) {
        log('SR exception: ' + e.message, 'err');
        listening = false;
        btn.classList.remove('active');
        btn.textContent = '[ HOLD TO TALK ]';
      }
    }

    function stopSR() {
      if (!listening || !recognition) return;
      log('stopping SR...', 'info');
      try { recognition.stop(); } catch(e) { log('stop err: ' + e.message, 'err'); }
    }

    // ── 4. Send to LLM ─────────────────────────────────────────
    function sendToLLM(text) {
      log('sending: ' + text.slice(0, 40), 'info');
      setStatus('thinking...');

      window.onPluginMessage = function(data) {
        log('LLM response received', 'ok');
        const reply = (data && data.message) ? data.message : JSON.stringify(data);
        log(reply.slice(0, 100), 'ok');
        setStatus('done');
      };

      try {
        PluginMessageHandler.postMessage(JSON.stringify({
          message: text,
          useLLM: true,
          wantsR1Response: false
        }));
        log('sent to LLM', 'ok');
      } catch(e) {
        log('LLM err: ' + e.message, 'err');
        setStatus('LLM error');
      }
    }

    // ── 5. Button events ───────────────────────────────────────
    btn.addEventListener('mousedown',  startSR);
    btn.addEventListener('mouseup',    stopSR);
    btn.addEventListener('touchstart', function(e) { e.preventDefault(); startSR(); });
    btn.addEventListener('touchend',   function(e) { e.preventDefault(); stopSR(); });

    // PTT
    window.addEventListener('longPressStart', startSR);
    window.addEventListener('longPressEnd',   stopSR);
    window.addEventListener('sideClick', function() {
      if (!listening) startSR(); else stopSR();
    });

    // ── Init ───────────────────────────────────────────────────
    warmMic();
  </script>
</body>
</html>
