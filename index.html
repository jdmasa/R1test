<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STT Probe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
    }
    #log {
      padding: 6px;
      height: 222px;
      overflow-y: auto;
      word-break: break-all;
    }
    .line { margin-bottom: 3px; }
    .err  { color: #f44; }
    .ok   { color: #0f0; }
    .info { color: #ff0; }
    button {
      display: block;
      width: 100%;
      height: 30px;
      background: #111;
      color: #fff;
      border: none;
      border-top: 1px solid #444;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    button:active { background: #333; }
  </style>
</head>
<body>
  <div id="log"></div>
  <button id="btn-sr">[ TEST SPEECHRECOGNITION ]</button>
  <button id="btn-mr">[ TEST MEDIARECORDER ]</button>

  <script>
    function log(msg, type) {
      const d = document.getElementById('log');
      const line = document.createElement('div');
      line.className = 'line ' + (type || 'info');
      line.textContent = msg;
      d.appendChild(line);
      d.scrollTop = d.scrollHeight;
    }

    log('-- API availability --', 'info');

    // SpeechRecognition
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    log('SpeechRecognition: '        + (!!window.SpeechRecognition),        window.SpeechRecognition        ? 'ok' : 'err');
    log('webkitSpeechRecognition: '  + (!!window.webkitSpeechRecognition),  window.webkitSpeechRecognition  ? 'ok' : 'err');
    log('SpeechGrammarList: '        + (!!window.SpeechGrammarList),        window.SpeechGrammarList        ? 'ok' : 'err');

    // MediaRecorder
    log('MediaRecorder: '            + (!!window.MediaRecorder),            window.MediaRecorder            ? 'ok' : 'err');
    log('AudioContext: '             + (!!window.AudioContext),              window.AudioContext             ? 'ok' : 'err');

    // Supported MIME types (if MediaRecorder exists)
    if (window.MediaRecorder) {
      const types = [
        'audio/webm',
        'audio/webm;codecs=opus',
        'audio/ogg;codecs=opus',
        'audio/mp4',
        'audio/wav',
      ];
      log('-- supported mimetypes --', 'info');
      types.forEach(t => {
        const supported = MediaRecorder.isTypeSupported(t);
        log(t + ': ' + supported, supported ? 'ok' : 'err');
      });
    }

    // Test SpeechRecognition live
    document.getElementById('btn-sr').addEventListener('click', function() {
      log('-- SR live test --', 'info');
      if (!SR) { log('SR not available', 'err'); return; }
      try {
        const recognition = new SR();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart  = () => log('SR started, speak...', 'ok');
        recognition.onresult = (e) => {
          const transcript = e.results[0][0].transcript;
          log('heard: ' + transcript, 'ok');
          log('confidence: ' + e.results[0][0].confidence.toFixed(2), 'ok');
        };
        recognition.onerror  = (e) => log('SR error: ' + e.error, 'err');
        recognition.onend    = () => log('SR ended', 'info');

        recognition.start();
        log('SR.start() called', 'ok');
      } catch(e) {
        log('SR exception: ' + e.message, 'err');
      }
    });

    // Test MediaRecorder live — hold to record 3 seconds
    document.getElementById('btn-mr').addEventListener('click', async function() {
      log('-- MR live test --', 'info');
      if (!window.MediaRecorder) { log('MediaRecorder not available', 'err'); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        log('mic stream OK', 'ok');

        const recorder = new MediaRecorder(stream);
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
          const blob = new Blob(chunks, { type: recorder.mimeType });
          log('recorded blob OK', 'ok');
          log('size: ' + blob.size + ' bytes', 'ok');
          log('type: ' + blob.type, 'ok');
          stream.getTracks().forEach(t => t.stop());
        };
        recorder.onerror = e => log('MR error: ' + e.error, 'err');

        recorder.start();
        log('recording 3s...', 'info');
        setTimeout(() => {
          recorder.stop();
          log('stopped', 'info');
        }, 3000);
      } catch(e) {
        log('MR exception: ' + e.message, 'err');
      }
    });

    // PTT = trigger SR test
    window.addEventListener('longPressStart', () => {
      log('PTT held — triggering SR', 'info');
      document.getElementById('btn-sr').click();
    });
    window.addEventListener('sideClick', () => {
      log('PTT click — triggering MR', 'info');
      document.getElementById('btn-mr').click();
    });
  </script>
</body>
</html>
