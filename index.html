<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ghibli Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
    }
    #viewfinder {
      width: 240px;
      height: 140px;
      background: #111;
      position: relative;
    }
    #video, #result-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #result-img { display: none; }
    #status {
      height: 14px;
      line-height: 14px;
      padding: 0 4px;
      background: #111;
      color: #ff0;
      border-top: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #raw {
      height: 100px;
      padding: 4px;
      overflow-y: auto;
      word-break: break-all;
      color: #0f0;
      background: #000;
      border-top: 1px solid #222;
      font-size: 9px;
    }
    button {
      display: block;
      width: 100%;
      height: 28px;
      background: #111;
      color: #fff;
      border: none;
      border-top: 1px solid #444;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    button:active { background: #333; }
  </style>
</head>
<body>
  <div id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <img id="result-img" alt="generated">
  </div>
  <div id="status">starting...</div>
  <div id="raw">raw response will appear here...</div>
  <canvas id="canvas" width="160" height="120" style="display:none"></canvas>
  <button id="btn">[ CAPTURE + GHIBLIFY ]</button>

  <script>
    const video     = document.getElementById('video');
    const canvas    = document.getElementById('canvas');
    const ctx       = canvas.getContext('2d');
    const status    = document.getElementById('status');
    const raw       = document.getElementById('raw');
    const btn       = document.getElementById('btn');
    const resultImg = document.getElementById('result-img');

    let busy = false;

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }, audio: false
        });
        video.srcObject = stream;
        status.textContent = 'ready — PTT or tap button';
      } catch(e) {
        status.textContent = 'cam error: ' + e.message;
      }
    }

    function capture() {
      if (busy) return;
      busy = true;
      btn.textContent = '[ ... ]';
      raw.textContent = '';

      // Hide any previous result, show live video
      resultImg.style.display = 'none';
      video.style.display = 'block';

      ctx.drawImage(video, 0, 0, 160, 120);
      const base64 = canvas.toDataURL('image/jpeg', 0.5);
      const kb = Math.round(base64.length / 1024);
      status.textContent = 'sending (' + kb + 'KB)...';

      const message =
        'Transform the scene in this image into Studio Ghibli animation style. ' +
        'Return your response ONLY as a base64 encoded JPEG data URI in this exact format: ' +
        'data:image/jpeg;base64,<base64data> ' +
        'Do not include any other text, just the data URI. ' +
        'IMAGE_DATA_URI: ' + base64;

      window.onPluginMessage = function(data) {
        busy = false;
        btn.textContent = '[ CAPTURE + GHIBLIFY ]';

        const full = JSON.stringify(data);
        // Show first 300 chars of raw response
        raw.textContent = full.slice(0, 300) + (full.length > 300 ? '...' : '');

        // Try to extract a data URI from anywhere in the response
        const dataUriMatch = full.match(/data:image\/[a-z]+;base64,[A-Za-z0-9+/=]+/);
        if (dataUriMatch) {
          status.textContent = '🎉 image found! displaying...';
          resultImg.src = dataUriMatch[0];
          resultImg.style.display = 'block';
          video.style.display = 'none';
        } else {
          status.textContent = 'no image in response (' + full.length + ' chars)';
        }
      };

      try {
        PluginMessageHandler.postMessage(JSON.stringify({
          message: message,
          useLLM: true,
          wantsR1Response: false
        }));
      } catch(e) {
        status.textContent = 'SDK err: ' + e.message;
        busy = false;
        btn.textContent = '[ CAPTURE + GHIBLIFY ]';
      }
    }

    btn.addEventListener('click', capture);
    window.addEventListener('sideClick', capture);
    window.addEventListener('longPressStart', capture);

    initCamera();
  </script>
</body>
</html>
