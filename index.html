<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ghibli Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
    }
    #viewfinder {
      width: 240px;
      height: 140px;
      background: #111;
      flex-shrink: 0;
      position: relative;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #status {
      height: 14px;
      line-height: 14px;
      padding: 0 4px;
      background: #111;
      color: #ff0;
      border-top: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Raw response dump — scrollable */
    #raw {
      height: 100px;
      padding: 4px;
      overflow-y: auto;
      word-break: break-all;
      color: #0f0;
      background: #000;
      border-top: 1px solid #222;
      font-size: 9px;
    }
    button {
      display: block;
      width: 100%;
      height: 28px;
      background: #111;
      color: #fff;
      border: none;
      border-top: 1px solid #444;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    button:active { background: #333; }
  </style>
</head>
<body>
  <div id="viewfinder"><video id="video" autoplay playsinline muted></video></div>
  <div id="status">starting...</div>
  <div id="raw">raw response will appear here...</div>
  <canvas id="canvas" width="160" height="120" style="display:none"></canvas>
  <button id="btn">[ CAPTURE + ASK GHIBLI ]</button>

  <script>
    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const status = document.getElementById('status');
    const raw    = document.getElementById('raw');
    const btn    = document.getElementById('btn');

    let busy = false;

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }, audio: false
        });
        video.srcObject = stream;
        status.textContent = 'ready — PTT or tap button';
      } catch(e) {
        status.textContent = 'cam error: ' + e.message;
      }
    }

    function capture() {
      if (busy) return;
      busy = true;
      btn.textContent = '[ ... ]';
      raw.textContent = '';

      ctx.drawImage(video, 0, 0, 160, 120);
      const base64 = canvas.toDataURL('image/jpeg', 0.5);
      const kb = Math.round(base64.length / 1024);
      status.textContent = 'sending (' + kb + 'KB)...';

      // Ask the LLM to generate a Ghibli-style image
      // We try several phrasings in one message to probe what it can do
      const message =
        'I am sending you a photo. Please transform this image into Studio Ghibli animation style. ' +
        'If you can generate or return an image, please do so. ' +
        'If you cannot generate images, please respond with: CANNOT_GENERATE and then describe ' +
        'in detail what a Ghibli-style version of this scene would look like.\n' +
        'IMAGE_DATA_URI: ' + base64;

      window.onPluginMessage = function(data) {
        busy = false;
        btn.textContent = '[ CAPTURE + ASK GHIBLI ]';

        // Dump the FULL raw response object
        const full = JSON.stringify(data, null, 2);
        raw.textContent = full;
        status.textContent = 'done — ' + full.length + ' chars';

        // Also check if there's anything that looks like an image URL or base64
        const str = JSON.stringify(data);
        if (str.includes('data:image')) {
          status.textContent = '🎉 image data found in response!';
        } else if (str.includes('http') && (str.includes('.png') || str.includes('.jpg') || str.includes('.webp'))) {
          status.textContent = '🎉 image URL found in response!';
        } else if (str.includes('CANNOT_GENERATE')) {
          status.textContent = 'no image gen — text only';
        }
      };

      try {
        PluginMessageHandler.postMessage(JSON.stringify({
          message: message,
          useLLM: true,
          wantsR1Response: false
        }));
      } catch(e) {
        status.textContent = 'SDK err: ' + e.message;
        busy = false;
        btn.textContent = '[ CAPTURE + ASK GHIBLI ]';
      }
    }

    btn.addEventListener('click', capture);
    window.addEventListener('sideClick', capture);
    window.addEventListener('longPressStart', capture);

    initCamera();
  </script>
</body>
</html>
