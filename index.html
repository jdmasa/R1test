<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=320, user-scalable=no, initial-scale=1.0">
    <title>Archery Target Scorer</title>
  <script type="module" crossorigin src="./assets/main-DvAAeP4w.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/main-BMSs6gVy.css">
</head>
<body>
    <div id="app">
        <div id="camera-section">
            <h1>Diana de Tiro</h1>
            <div id="camera-container">
                <video id="camera-feed" autoplay playsinline></video>
                <canvas id="capture-canvas"></canvas>
                <canvas id="analysis-canvas"></canvas>
            </div>
            <div id="controls">
                <button id="capture-btn" class="touchable">Capturar Foto</button>
                <button id="analyze-btn" class="touchable" style="display:none;">Analizar Diana</button>
            </div>
        </div>
        
        <div id="results-section" style="display:none;">
            <h2>Puntuación</h2>
            <div id="scores-container"></div>
            <div id="arrows-info"></div>
            <button id="new-capture-btn" class="touchable">Nueva Captura</button>
        </div>
        
        <div id="status">
            <p id="status-text">Presiona botón lateral para capturar</p>
        </div>
    </div>
</body>
</html>
