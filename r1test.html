<!DOCTYPE html>
<!--
  pixelart-test — Rabbit R1 Creation
  Diagnostic tool for the com.r1.pixelart image generation bridge.
  - Opens camera, captures on side-button press
  - Sends to pixelart bridge with a fixed style prompt
  - Logs EVERY raw field of every response so we can see what comes back
  - Uses BOTH window.onPluginMessage and pluginMessage CustomEvent listener
    to figure out which channel the pixelart bridge uses
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixelart Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 10px;
    }

    #app {
      width: 240px;
      height: 282px;
      border: 3px solid #222;
      display: flex;
      flex-direction: column;
    }

    /* Live camera preview — small to leave room for log */
    #video {
      width: 240px;
      height: 120px;
      object-fit: cover;
      background: #111;
      flex-shrink: 0;
      display: block;
    }

    /* Scrollable response log */
    #log {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 4px;
      background: #0d0d0d;
      border-top: 1px solid #222;
    }

    .log-entry {
      margin-bottom: 4px;
      padding: 3px 4px;
      border-radius: 3px;
      word-break: break-all;
      line-height: 1.4;
    }

    .log-info   { color: #888; }
    .log-send   { color: #4af; background: #001520; }
    .log-recv   { color: #4f4; background: #001500; }
    .log-field  { color: #fa4; background: #150a00; }
    .log-error  { color: #f44; background: #150000; }

    /* Status bar at bottom */
    #statusbar {
      height: 22px;
      flex-shrink: 0;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 6px;
    }

    #status {
      flex: 1;
      color: #aaa;
      font-size: 9px;
    }

    /* Clear log button */
    #btn-clear {
      height: 18px;
      padding: 0 6px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      color: #666;
      font-family: monospace;
      font-size: 9px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>

  <div id="log">
    <div class="log-entry log-info">Starting up…</div>
  </div>

  <div id="statusbar">
    <span id="status">initializing</span>
    <button id="btn-clear">CLR</button>
  </div>
</div>

<script>
  const isR1 = typeof PluginMessageHandler !== 'undefined';

  // ─── DOM ──────────────────────────────────────────────────────────────────
  const videoEl   = document.getElementById('video');
  const logEl     = document.getElementById('log');
  const statusEl  = document.getElementById('status');
  const btnClear  = document.getElementById('btn-clear');

  // ─── Logging ──────────────────────────────────────────────────────────────
  function log(msg, cls = 'log-info') {
    const el = document.createElement('div');
    el.className = `log-entry ${cls}`;
    el.textContent = msg;
    logEl.appendChild(el);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  // ─── Response handler — called from BOTH listener strategies ──────────────
  // We want to dump every single field so we know exactly what the bridge returns.
  function handleResponse(data, source) {
    log(`── response via ${source} ──`, 'log-recv');

    if (data === null || data === undefined) {
      log('(null/undefined data)', 'log-error');
      return;
    }

    if (typeof data === 'string') {
      log(`raw string: ${data.substring(0, 120)}`, 'log-field');
      try {
        data = JSON.parse(data);
        log('(parsed as JSON)', 'log-info');
      } catch(e) {
        log('(not JSON)', 'log-info');
        setStatus('got string response');
        return;
      }
    }

    // Dump every key-value pair
    const keys = Object.keys(data);
    if (keys.length === 0) {
      log('(empty object)', 'log-error');
    } else {
      keys.forEach(k => {
        const v = data[k];
        const display = (typeof v === 'string' && v.length > 80)
          ? v.substring(0, 80) + `… [${v.length}ch]`
          : JSON.stringify(v);
        log(`${k}: ${display}`, 'log-field');
      });
    }

    setStatus(`response (${keys.length} fields)`);
    // Update border color based on known status values
    if (data.status === 'processing') {
      document.getElementById('app').style.borderColor = '#3344cc';
      setStatus('processing…');
    } else if (data.status === 'complete') {
      document.getElementById('app').style.borderColor = '#33cc44';
      setStatus('complete!');
    } else if (data.error) {
      document.getElementById('app').style.borderColor = '#cc3333';
      setStatus('error: ' + data.error);
    }
  }

  // ─── Strategy 1: direct window.onPluginMessage assignment ─────────────────
  // This is the pattern our original skill used.
  window.onPluginMessage = function(data) {
    handleResponse(data, 'window.onPluginMessage');
  };

  // ─── Strategy 2: CustomEvent listener ─────────────────────────────────────
  // This is how the official Rabbit SDK wrapper dispatches messages.
  // The SDK's setupPluginMessageHandler() does:
  //   window.onPluginMessage = function(data) {
  //     window.dispatchEvent(new CustomEvent('pluginMessage', { detail: data }))
  //   }
  // So if rabbitOS calls window.onPluginMessage internally, this fires too.
  window.addEventListener('pluginMessage', function(e) {
    handleResponse(e.detail, 'CustomEvent:pluginMessage');
  });

  // ─── Capture & send ───────────────────────────────────────────────────────
  function captureAndSend() {
    if (!videoEl.videoWidth) {
      log('video not ready', 'log-error');
      return;
    }

    // Capture at full camera resolution (as the official app does)
    const canvas = document.createElement('canvas');
    canvas.width  = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;
    canvas.getContext('2d').drawImage(videoEl, 0, 0);

    const dataUri  = canvas.toDataURL('image/jpeg', 0.8);
    const sizeKB   = Math.round(dataUri.length * 0.75 / 1024);

    log(`captured ${canvas.width}×${canvas.height} ~${sizeKB}KB`, 'log-send');

    // Fixed style prompt for testing
    const prompt = 'Take a picture in the style of a Simpsons cartoon.';
    log(`sending: "${prompt}"`, 'log-send');
    log(`pluginId: com.r1.pixelart`, 'log-send');

    setStatus('sending…');
    document.getElementById('app').style.borderColor = '#884400';

    if (isR1) {
      PluginMessageHandler.postMessage(JSON.stringify({
        message:     prompt,
        pluginId:    'com.r1.pixelart',
        imageBase64: dataUri
      }));
      log('sent to r1 bridge ✓', 'log-info');
    } else {
      // Desktop simulation
      log('[desktop: bridge not available]', 'log-error');
      setTimeout(() => handleResponse({ status: 'processing' }, 'simulated'), 500);
      setTimeout(() => handleResponse({ status: 'complete', message: 'done' }, 'simulated'), 2000);
    }
  }

  // ─── Init camera ──────────────────────────────────────────────────────────
  async function init() {
    log(`isR1: ${isR1}`, 'log-info');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      });
      videoEl.srcObject = stream;
      await new Promise(resolve => { videoEl.onloadedmetadata = resolve; });
      await videoEl.play();
      log(`camera ready ${videoEl.videoWidth}×${videoEl.videoHeight}`, 'log-info');
      setStatus('press side button');
    } catch (err) {
      log(`camera error: ${err.message}`, 'log-error');
      setStatus('camera error');
    }
  }

  // ─── Hardware events ──────────────────────────────────────────────────────
  window.addEventListener('sideClick', () => {
    log('── sideClick ──', 'log-info');
    captureAndSend();
  });

  // Touch fallback — tap anywhere on video to trigger
  document.body.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.target === videoEl || e.target.closest('#video')) {
      log('── tap ──', 'log-info');
      captureAndSend();
    }
  }, { passive: false });

  // Desktop click fallback
  videoEl.addEventListener('click', () => {
    log('── click ──', 'log-info');
    captureAndSend();
  });

  // ─── Clear log ────────────────────────────────────────────────────────────
  btnClear.addEventListener('click', () => {
    logEl.innerHTML = '';
    log('log cleared', 'log-info');
  });

  // ─── Boot ─────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
