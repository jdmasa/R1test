<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Voice Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #0a0a0a;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }
    #app {
      width: 240px;
      height: 282px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── PTT ring ── */
    #ptt-wrap {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #ptt-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
    }
    #ptt-ring.recording { border-color: #f44; box-shadow: 0 0 18px #f446; }
    #ptt-ring.thinking  { border-color: #4af; box-shadow: 0 0 18px #4af6; }
    #ptt-ring.ready     { border-color: #4f4; box-shadow: 0 0 10px #4f42; }

    #state-label {
      font-size: 9px;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── You said ── */
    #you-said {
      margin-top: 8px;
      width: 220px;
      padding: 4px 6px;
      background: #111;
      border: 1px solid #222;
      border-radius: 3px;
      color: #ff0;
      font-size: 10px;
      min-height: 22px;
      line-height: 1.4;
      word-break: break-word;
    }

    /* ── Response ── */
    #response {
      margin-top: 5px;
      width: 220px;
      flex: 1;
      padding: 5px 6px;
      overflow-y: auto;
      background: #000;
      border: 1px solid #222;
      border-radius: 3px;
      color: #ddd;
      font-size: 11px;
      line-height: 1.45;
      word-break: break-word;
    }

    /* ── Hold button ── */
    #hold-btn {
      width: 100%;
      height: 30px;
      background: #111;
      color: #666;
      border: none;
      border-top: 1px solid #333;
      font-family: monospace;
      font-size: 10px;
      cursor: pointer;
      flex-shrink: 0;
      letter-spacing: 1px;
      margin-top: 5px;
    }
    #hold-btn.recording { background: #1a0000; color: #f44; }
    #hold-btn.thinking  { color: #4af; }
  </style>
</head>
<body>
<div id="app">
  <div id="ptt-wrap">
    <div id="ptt-ring">🎙</div>
    <div id="state-label">initializing...</div>
  </div>
  <div id="you-said">—</div>
  <div id="response">Hold PTT or button to speak.</div>
  <button id="hold-btn">[ HOLD TO TALK ]</button>
</div>

<script>
  const ring      = document.getElementById('ptt-ring');
  const label     = document.getElementById('state-label');
  const youSaid   = document.getElementById('you-said');
  const response  = document.getElementById('response');
  const holdBtn   = document.getElementById('hold-btn');

  const WHISPER_URL = 'https://masatrad-whisper.hf.space/asr?output=txt&encode=true';

  let micStream  = null;
  let recorder   = null;
  let chunks     = [];
  let recording  = false;
  let busy       = false;

  // ── State helpers ──────────────────────────────────────────────
  function setState(s) {
    ring.className  = s;
    holdBtn.className = s;
    const states = {
      idle:      { icon: '🎙', lbl: 'hold PTT to speak',  btn: '[ HOLD TO TALK ]' },
      recording: { icon: '🔴', lbl: 'listening...',        btn: '[ RELEASE TO SEND ]' },
      thinking:  { icon: '💭', lbl: 'thinking...',         btn: '[ ... ]' },
      ready:     { icon: '🎙', lbl: 'hold PTT to speak',   btn: '[ HOLD TO TALK ]' },
    };
    const s2 = states[s] || states.idle;
    ring.textContent  = s2.icon;
    label.textContent = s2.lbl;
    holdBtn.textContent = s2.btn;
  }

  // ── Init mic ───────────────────────────────────────────────────
  async function initMic() {
    setState('idle');
    label.textContent = 'Press to start...';
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      setState('ready');
    } catch(e) {
      label.textContent = 'mic error: ' + e.message;
    }
  }

  // ── Start recording ────────────────────────────────────────────
  function startRecording() {
    if (recording || busy || !micStream) return;
    recording = true;
    chunks    = [];
    setState('recording');

    recorder = new MediaRecorder(micStream, { mimeType: 'audio/webm;codecs=opus' });
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = onStop;
    recorder.start(100);
  }

  // ── Stop recording ─────────────────────────────────────────────
  function stopRecording() {
    if (!recording || !recorder) return;
    recording = false;
    recorder.stop();
    setState('thinking');
    busy = true;
  }

  // ── On stop: send to Whisper ───────────────────────────────────
  async function onStop() {
    const blob = new Blob(chunks, { type: 'audio/webm;codecs=opus' });

    try {
      label.textContent = 'transcribing...';
      const formData = new FormData();
      formData.append('audio_file', blob, 'audio.webm');

      const res = await fetch(WHISPER_URL, { method: 'POST', body: formData });
      if (!res.ok) throw new Error('Whisper HTTP ' + res.status);

      const transcript = (await res.text()).trim();
      if (!transcript) throw new Error('empty transcript');

      youSaid.textContent = transcript;
      sendToLLM(transcript);

    } catch(e) {
      label.textContent  = 'whisper error: ' + e.message;
      response.textContent = 'Transcription failed: ' + e.message;
      busy = false;
      setState('ready');
    }
  }

  // ── Send transcript to r1 LLM ──────────────────────────────────
  function sendToLLM(text) {
    label.textContent = 'sending to LLM...';

    window.onPluginMessage = function(data) {
      const reply = (data && data.message) ? data.message
                  : (data && data.data)    ? data.data
                  : JSON.stringify(data);
      response.textContent = reply;
      busy = false;
      setState('ready');
    };

    try {
      PluginMessageHandler.postMessage(JSON.stringify({
        message: text,
        useLLM: true,
        wantsR1Response: false
      }));
    } catch(e) {
      response.textContent = 'LLM error: ' + e.message;
      busy = false;
      setState('ready');
    }
  }

  // ── Hardware PTT ───────────────────────────────────────────────
  window.addEventListener('longPressStart', startRecording);
  window.addEventListener('longPressEnd',   stopRecording);
  window.addEventListener('sideClick', () => {
    if (!recording && !busy) startRecording();
    else if (recording)      stopRecording();
  });

  // ── On-screen button ───────────────────────────────────────────
  holdBtn.addEventListener('mousedown',  startRecording);
  holdBtn.addEventListener('mouseup',    stopRecording);
  holdBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  holdBtn.addEventListener('touchend',   e => { e.preventDefault(); stopRecording(); });

  // ── Init ───────────────────────────────────────────────────────
  initMic();
</script>
</body>
</html>
