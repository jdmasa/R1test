<!DOCTYPE html>
<!--
  pixelart-cam — Rabbit R1 Creation
  Captures a photo, sends it to the r1 pixelart bridge for AI style transformation.

  IMPORTANT — how this bridge works:
  - You send: message (style prompt) + pluginId:"com.r1.pixelart" + imageBase64
  - Bridge responds with status:"processing" back to window.onPluginMessage
  - The GENERATED IMAGE is delivered by rabbitOS to its own image viewer/gallery
    — it does NOT come back to this WebView as base64 or any other format
  - status:"complete" may or may not fire back into the WebView
  - This Creation shows the captured freeze-frame as a "before" preview,
    a spinner while processing, and a reset button. That is the full loop.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixelart Cam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }

    #app {
      width: 240px;
      height: 282px;
      border: 4px solid #222;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: border-color 0.2s ease;
    }

    /* ── Boot screen ── */
    #boot-screen {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 282px;
      background: #000;
      border: 4px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 20px;
    }

    #boot-screen .boot-text {
      text-align: center;
      color: #888;
      font-family: monospace;
    }

    #boot-screen .boot-title {
      margin-bottom: 10px;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #boot-screen .boot-subtitle {
      font-size: 10px;
      color: #555;
    }

    /* ── Camera / preview layer ── */
    #video, #preview {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      object-fit: cover;
    }

    #preview {
      display: none;
    }

    /* ── Style label strip ── */
    #style-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 22px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      display: flex;
      align-items: center;
      padding: 0 8px;
      pointer-events: none;
    }

    #style-name {
      font-size: 10px;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Processing overlay ── */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      background: rgba(0,0,0,0.65);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #overlay.visible {
      display: flex;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #6af;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #overlay-text {
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }

    /* ── Bottom bar ── */
    #bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 38px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 6px;
    }

    #status {
      flex: 1;
      font-size: 9px;
      color: #888;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* Scroll wheel hint arrows */
    #arr-up, #arr-down {
      font-size: 14px;
      color: #444;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      user-select: none;
    }

    /* Reset button — shown while in preview state */
    #btn-reset {
      display: none;
      height: 28px;
      padding: 0 10px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #aaa;
      font-family: monospace;
      font-size: 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    #btn-reset.visible {
      display: block;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Boot screen - side button will boot -->
  <div id="boot-screen">
    <div class="boot-text">
      <div class="boot-title">PIXELART CAM</div>
      <div class="boot-subtitle">press side button</div>
    </div>
  </div>

  <!-- Camera and preview images -->
  <video id="video" autoplay playsinline muted style="display: none;"></video>
  <img   id="preview" alt="captured">

  <!-- Current style name overlay at top -->
  <div id="style-strip">
    <span id="style-name">SIMPSONS</span>
  </div>

  <!-- Processing spinner overlay -->
  <div id="overlay">
    <div class="spinner"></div>
    <div id="overlay-text">Sending to r1…</div>
  </div>

  <!-- Bottom bar: status + scroll hints + reset -->
  <div id="bar">
    <span id="arr-up">▲</span>
    <span id="status">loading…</span>
    <span id="arr-down">▼</span>
    <button id="btn-reset">↺ retake</button>
  </div>

</div>
<script>
  // ─── Plugin Bridge Setup ──────────────────────────────────────────────────
  // Setup window.onPluginMessage FIRST - before anything else
  if (!window.onPluginMessage) {
    window.onPluginMessage = function(data) {
      console.log('onPluginMessage called:', data);
      window.dispatchEvent(new CustomEvent('pluginMessage', { detail: data }));
    };
  }

  const isR1 = typeof PluginMessageHandler !== 'undefined';
  console.log('Is R1:', isR1);

  // ─── Style list ───────────────────────────────────────────────────────────
  const STYLES = [
    { name: 'SIMPSONS',    prompt: 'Take a picture in the style of a Simpsons cartoon.' },
    { name: 'GHIBLI',      prompt: 'Take a picture in the Studio Ghibli anime style — soft colors, whimsical atmosphere, and hand-drawn aesthetic.' },
    { name: 'PIXAR',       prompt: 'Take a picture in the style of Pixar Animation.' },
    { name: 'MINECRAFT',   prompt: 'Take a picture in the style of Minecraft.' },
    { name: 'LEGO',        prompt: 'Take a picture and make it LEGO minifigures.' },
    { name: 'WATERCOLOR',  prompt: 'Take a picture in the style of a Watercolor painting.' },
    { name: 'CYBERPUNK',   prompt: 'Take a picture in a cyberpunk style with neon colors, tech elements, and futuristic vibes.' },
    { name: 'COMIC',       prompt: 'Take a picture and make the subject a superhero in a comic book with several frames.' },
    { name: 'FUNKO POP',   prompt: 'Take a picture and turn the subject into a Funko Pop.' },
    { name: 'WARHOL',      prompt: 'Take a picture in the style of Andy Warhol — pop art with four duplicated images in a frame.' },
    { name: 'RENAISSANCE', prompt: 'Take a picture in the style of a Renaissance Painting with depth, realism, and natural light.' },
    { name: 'WANTED',      prompt: 'Take a picture in the style of an Old West Wanted Poster. The poster title is WANTED.' },
    { name: 'TIME COVER',  prompt: 'Take a picture in the style of a polished TIME magazine cover. The title is PERSON OF THE YEAR.' },
    { name: 'SOUTH PARK',  prompt: 'Take a picture in the style of a South Park cartoon.' },
    { name: 'PERFECT',     prompt: 'Take a picture and make it picture perfect — improve lighting, colors, and overall composition. Make it photorealistic. 8k resolution.' },
  ];

  let styleIndex = 0;

  // ─── State ────────────────────────────────────────────────────────────────
  let state = 'boot';

  // ─── DOM refs ─────────────────────────────────────────────────────────────
  const appEl       = document.getElementById('app');
  const bootScreen  = document.getElementById('boot-screen');
  const videoEl     = document.getElementById('video');
  const previewEl   = document.getElementById('preview');
  const overlayEl   = document.getElementById('overlay');
  const overlayText = document.getElementById('overlay-text');
  const styleNameEl = document.getElementById('style-name');
  const statusEl    = document.getElementById('status');
  const btnReset    = document.getElementById('btn-reset');

  // ─── UI helpers ───────────────────────────────────────────────────────────
  function setState(s) {
    state = s;
    console.log('setState:', s);
    switch (s) {
      case 'boot':
        bootScreen.style.display = 'flex';
        videoEl.style.display = 'none';
        previewEl.style.display = 'none';
        overlayEl.classList.remove('visible');
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#222';
        setStatus('press side button');
        break;
      case 'initializing':
        bootScreen.style.display = 'flex';
        setStatus('loading camera…');
        appEl.style.borderColor = '#334499';
        break;
      case 'live':
        bootScreen.style.display = 'none';
        videoEl.style.display = 'block';
        previewEl.style.display = 'none';
        overlayEl.classList.remove('visible');
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#222';
        setStatus('▲▼ change style · side btn shoot');
        break;
      case 'sending':
        videoEl.style.display = 'none';
        previewEl.style.display = 'block';
        overlayEl.classList.add('visible');
        overlayText.textContent = 'Sending to r1…';
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#884400';
        setStatus('sending…');
        break;
      case 'processing':
        overlayText.textContent = 'r1 is transforming…';
        appEl.style.borderColor = '#334499';
        setStatus('processing on device…');
        break;
      case 'done':
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#226622';
        setStatus('done · result in r1 gallery');
        break;
      case 'error':
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#662222';
        break;
    }
  }

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  function updateStyleLabel() {
    styleNameEl.textContent = STYLES[styleIndex].name;
  }

  // ─── Initialize camera ────────────────────────────────────────────────────
  let cameraStream = null;
  let cameraIndex = 0;
  let availableCameras = [];
  let isInitializing = false;

  async function enumerateDevices() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter(d => d.kind === 'videoinput');
      console.log('Available cameras:', cameras.length);
      return cameras;
    } catch (err) {
      console.error('Error enumerating cameras:', err);
      return [];
    }
  }

  function getCameraConstraints(cameraIndex = 0, availableCameras = []) {
    return {
      video: {
        ...(availableCameras.length > 0 ? { deviceId: { exact: availableCameras[cameraIndex].deviceId } } : { facingMode: 'environment' }),
        width: { min: 640, ideal: 1280, max: 1920 },
        height: { min: 480, ideal: 720, max: 1080 },
        aspectRatio: { ideal: 16 / 9 }
      }
    };
  }

  async function initializeCamera() {
    if (isInitializing || state !== 'boot') {
      console.log('Cannot initialize: isInitializing=' + isInitializing + ', state=' + state);
      return;
    }

    isInitializing = true;
    setState('initializing');

    try {
      console.log('Step 1: Enumerating cameras...');
      availableCameras = await enumerateDevices();
      cameraIndex = 0;

      console.log('Step 2: Getting user media with constraints...');
      const constraints = getCameraConstraints(cameraIndex, availableCameras);
      console.log('Constraints:', JSON.stringify(constraints));
      
      cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
      console.log('Step 3: Stream acquired, setting srcObject...');
      videoEl.srcObject = cameraStream;

      console.log('Step 4: Waiting for metadata...');
      await new Promise((resolve) => {
        videoEl.onloadedmetadata = async () => {
          console.log('Step 5: Metadata loaded, calling play()...');
          try {
            await videoEl.play();
            console.log('Step 6: Video playing, stabilizing...');
            setTimeout(() => {
              console.log('Step 7: Stream stabilized');
              resolve();
            }, 150);
          } catch (err) {
            console.error('Play error:', err);
            resolve();
          }
        };
      });

      console.log('Step 8: Camera ready!');
      updateStyleLabel();
      setState('live');

      // Setup message handler after camera is ready
      window.onPluginMessage = function(data) {
        console.log('Plugin message received:', data);
        if (data && data.status === 'processing') {
          setState('processing');
        } else if (data && data.status === 'complete') {
          setState('done');
        } else if (data && data.error) {
          setStatus('error: ' + data.error);
          setState('error');
        }
      };

    } catch (err) {
      console.error('Camera initialization error:', err);
      setStatus('camera error: ' + err.message);
      appEl.style.borderColor = '#662222';
      setState('error');
    } finally {
      isInitializing = false;
    }
  }

  // ─── Capture & send ───────────────────────────────────────────────────────
  function shoot() {
    if (state !== 'live') {
      console.log('Cannot shoot in state:', state);
      return;
    }

    if (!cameraStream || !videoEl.videoWidth) {
      console.log('Camera not ready');
      return;
    }

    console.log('Capturing photo...');
    const canvas = document.createElement('canvas');
    canvas.width  = videoEl.videoWidth  || 640;
    canvas.height = videoEl.videoHeight || 480;
    canvas.getContext('2d').drawImage(videoEl, 0, 0);

    const dataUri = canvas.toDataURL('image/jpeg', 0.8);

    previewEl.src = dataUri;
    setState('sending');

    const style = STYLES[styleIndex];

    // Register response handler
    let fallbackTimer = null;
    window.onPluginMessage = function(data) {
      console.log('Response received:', data);
      if (data && data.status === 'processing') {
        setState('processing');
      } else if (data && data.status === 'complete') {
        if (fallbackTimer) clearTimeout(fallbackTimer);
        setState('done');
      } else if (data && data.error) {
        if (fallbackTimer) clearTimeout(fallbackTimer);
        setStatus('error: ' + data.error);
        setState('error');
      }
    };

    function onCustomEvent(e) {
      window.onPluginMessage && window.onPluginMessage(e.detail);
      window.removeEventListener('pluginMessage', onCustomEvent);
    }
    window.addEventListener('pluginMessage', onCustomEvent);

    // Send to bridge
    if (isR1) {
      console.log('Sending to R1 bridge...');
      PluginMessageHandler.postMessage(JSON.stringify({
        message:     style.prompt,
        pluginId:    'com.r1.pixelart',
        imageBase64: dataUri
      }));
    } else {
      console.log('Desktop mode: simulating response...');
      setTimeout(() => { window.onPluginMessage({ status: 'processing' }); }, 600);
      setTimeout(() => { window.onPluginMessage({ status: 'complete' }); }, 3000);
    }

    // Fallback timeout
    fallbackTimer = setTimeout(() => {
      if (state === 'sending' || state === 'processing') {
        console.log('Fallback timeout triggered');
        setState('done');
        setStatus('sent · result in r1 gallery');
      }
    }, 15000);
  }

  // ─── Reset ────────────────────────────────────────────────────────────────
  function reset() {
    console.log('Resetting...');
    window.onPluginMessage = null;
    setState('live');
  }

  // ─── Style cycling ────────────────────────────────────────────────────────
  function nextStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex + 1) % STYLES.length;
    updateStyleLabel();
    setStatus(`${STYLES[styleIndex].name} · side btn to shoot`);
  }

  function prevStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex - 1 + STYLES.length) % STYLES.length;
    updateStyleLabel();
    setStatus(`${STYLES[styleIndex].name} · side btn to shoot`);
  }

  // ─── Register global event listeners ───────────────────────────────────────
  // These are registered EARLY and work throughout the app lifecycle
  window.addEventListener('sideClick', () => {
    console.log('sideClick event, state:', state);
    if (state === 'boot') {
      initializeCamera();
    } else if (state === 'live') {
      shoot();
    } else if (previewEl.style.display === 'block') {
      reset();
    }
  });

  window.addEventListener('longPressStart', () => {
    console.log('longPressStart event, state:', state);
    if (state === 'boot') {
      initializeCamera();
    } else if (state === 'live') {
      shoot();
    }
  });

  window.addEventListener('scrollDown', () => {
    console.log('scrollDown event');
    nextStyle();
  });

  window.addEventListener('scrollUp', () => {
    console.log('scrollUp event');
    prevStyle();
  });

  // ─── Touch events ─────────────────────────────────────────────────────────
  document.addEventListener('touchstart', e => {
    const t = e.target;
    console.log('Touch on:', t.id || t.tagName);
    
    if (t === videoEl && state === 'live') {
      shoot();
    } else if (t === previewEl) {
      reset();
    } else if (t.id === 'btn-reset' || t.closest('#btn-reset')) {
      reset();
    } else if (t.id === 'arr-up') {
      prevStyle();
    } else if (t.id === 'arr-down') {
      nextStyle();
    }
  }, { passive: false });

  // ─── Click fallbacks for desktop ──────────────────────────────────────────
  videoEl.addEventListener('click', shoot);
  btnReset.addEventListener('click', reset);
  document.getElementById('arr-up').addEventListener('click', prevStyle);
  document.getElementById('arr-down').addEventListener('click', nextStyle);

  // ─── Initialize ────────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    console.log('Page loaded, initializing...');
    setState('boot');
  });

  console.log('App script loaded and ready');
</script>
</body>
</html>
