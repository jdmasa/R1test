<!DOCTYPE html>
<!--
  pixelart-cam — Rabbit R1 Creation

  FIX HISTORY:
  v2 — cameraReady flag; removed longPressStart
  v3 — initInProgress guard; sideClick retries init
  v4 — splash screen with START button for guaranteed user gesture
  v5 — matched ref.js: no `muted`, onloadedmetadata callback, `ideal` constraints
  v6 — THE ROOT FIX:
       The video element is no longer hidden (display:none) at any point.
       It sits behind the splash at z-index 0, fully rendered in the DOM from
       page load. This keeps it in the browser's "visible" surface so that:
         a) getUserMedia / srcObject attachment works without quirks
         b) The tap on START falls through to the video layer, so the browser
            sees the play() call as directly triggered by a touch on the video
            itself — matching exactly how working plugins get past the autoplay
            policy (the "Play symbol" the user sees is the browser waiting for
            a tap on the video element specifically).
       The splash sits on top (z-index 100) and is simply removed on START.
       A "TAP TO PLAY" hint is shown over the video if it stalls after init,
       and tapping anywhere on the video area calls videoEl.play() directly.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixelart Cam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }

    #app {
      width: 240px;
      height: 282px;
      border: 4px solid #222;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: border-color 0.2s ease;
    }

    /* ── Video always present, never hidden ── */
    /* It sits at z-index 0 behind everything.  */
    /* The splash covers it; removing splash     */
    /* reveals it without any display toggle.    */
    #video {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      object-fit: cover;
      z-index: 0;
      background: #000;
    }

    #preview {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      object-fit: cover;
      display: none;
      z-index: 1;
    }

    /* ── Tap-to-play hint — shown if video stalls after init ── */
    #tap-hint {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 2;
      background: rgba(0,0,0,0.5);
    }

    #tap-hint.visible { display: flex; }

    #tap-hint span {
      font-size: 32px;
    }

    #tap-hint p {
      font-size: 9px;
      color: #aaa;
      text-align: center;
    }

    /* ── Splash screen — sits on top of everything ── */
    #splash {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 282px;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 100;
    }

    #splash-title {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
    }

    #splash-sub {
      font-size: 9px;
      color: #555;
      text-align: center;
      line-height: 1.6;
      padding: 0 20px;
    }

    #btn-start {
      margin-top: 6px;
      width: 120px;
      height: 36px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: uppercase;
    }

    #btn-start:active { background: #ccc; }

    /* ── Style label strip ── */
    #style-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 22px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      display: flex;
      align-items: center;
      padding: 0 8px;
      pointer-events: none;
      z-index: 3;
    }

    #style-name {
      font-size: 10px;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Processing overlay ── */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      background: rgba(0,0,0,0.65);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 3;
    }

    #overlay.visible { display: flex; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #6af;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #overlay-text {
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }

    /* ── Bottom bar ── */
    #bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 38px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 6px;
      z-index: 3;
    }

    #status {
      flex: 1;
      font-size: 9px;
      color: #888;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #arr-up, #arr-down {
      font-size: 14px;
      color: #444;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      user-select: none;
    }

    #btn-reset {
      display: none;
      height: 28px;
      padding: 0 10px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #aaa;
      font-family: monospace;
      font-size: 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    #btn-reset.visible { display: block; }
  </style>
</head>
<body>
<div id="app">

  <!-- Video is ALWAYS in the DOM and never hidden.
       The splash covers it. Removing the splash reveals it.
       This ensures the browser treats it as a persistent visible surface
       and that play() calls are accepted as user-gesture-triggered. -->
  <video id="video" autoplay playsinline></video>

  <img id="preview" alt="captured">

  <!-- Tap-to-play hint overlay — shown if video is paused after init -->
  <div id="tap-hint">
    <span>▶</span>
    <p>tap to start camera</p>
  </div>

  <!-- Style name -->
  <div id="style-strip">
    <span id="style-name">SIMPSONS</span>
  </div>

  <!-- Processing overlay -->
  <div id="overlay">
    <div class="spinner"></div>
    <div id="overlay-text">Sending to r1…</div>
  </div>

  <!-- Bottom bar -->
  <div id="bar">
    <span id="arr-up">▲</span>
    <span id="status">tap START to begin</span>
    <span id="arr-down">▼</span>
    <button id="btn-reset">↺ retake</button>
  </div>

  <!-- Splash sits on top — removed on START tap -->
  <div id="splash">
    <div id="splash-title">✦ Pixelart Cam</div>
    <div id="splash-sub">15 AI styles · scroll ▲▼ to pick<br>side button to shoot</div>
    <button id="btn-start">START</button>
  </div>

</div>
<script>
  const isR1 = typeof PluginMessageHandler !== 'undefined';

  const STYLES = [
    { name: 'SIMPSONS',    prompt: 'Take a picture in the style of a Simpsons cartoon.' },
    { name: 'GHIBLI',      prompt: 'Take a picture in the Studio Ghibli anime style — soft colors, whimsical atmosphere, and hand-drawn aesthetic.' },
    { name: 'PIXAR',       prompt: 'Take a picture in the style of Pixar Animation.' },
    { name: 'MINECRAFT',   prompt: 'Take a picture in the style of Minecraft.' },
    { name: 'LEGO',        prompt: 'Take a picture and make it LEGO minifigures.' },
    { name: 'WATERCOLOR',  prompt: 'Take a picture in the style of a Watercolor painting.' },
    { name: 'CYBERPUNK',   prompt: 'Take a picture in a cyberpunk style with neon colors, tech elements, and futuristic vibes.' },
    { name: 'COMIC',       prompt: 'Take a picture and make the subject a superhero in a comic book with several frames.' },
    { name: 'FUNKO POP',   prompt: 'Take a picture and turn the subject into a Funko Pop.' },
    { name: 'WARHOL',      prompt: 'Take a picture in the style of Andy Warhol — pop art with four duplicated images in a frame.' },
    { name: 'RENAISSANCE', prompt: 'Take a picture in the style of a Renaissance Painting with depth, realism, and natural light.' },
    { name: 'WANTED',      prompt: 'Take a picture in the style of an Old West Wanted Poster. The poster title is WANTED.' },
    { name: 'TIME COVER',  prompt: 'Take a picture in the style of a polished TIME magazine cover. The title is PERSON OF THE YEAR.' },
    { name: 'SOUTH PARK',  prompt: 'Take a picture in the style of a South Park cartoon.' },
    { name: 'PERFECT',     prompt: 'Take a picture and make it picture perfect — improve lighting, colors, and overall composition. Make it photorealistic. 8k resolution.' },
  ];

  let styleIndex     = 0;
  let state          = 'splash';
  let cameraReady    = false;
  let initInProgress = false;

  const appEl       = document.getElementById('app');
  const splashEl    = document.getElementById('splash');
  const splashSub   = document.getElementById('splash-sub');
  const btnStart    = document.getElementById('btn-start');
  const videoEl     = document.getElementById('video');
  const previewEl   = document.getElementById('preview');
  const tapHintEl   = document.getElementById('tap-hint');
  const overlayEl   = document.getElementById('overlay');
  const overlayText = document.getElementById('overlay-text');
  const styleNameEl = document.getElementById('style-name');
  const statusEl    = document.getElementById('status');
  const btnReset    = document.getElementById('btn-reset');

  function setState(s) {
    state = s;
    switch (s) {
      case 'live':
        splashEl.style.display  = 'none';
        previewEl.style.display = 'none';
        tapHintEl.classList.remove('visible');
        overlayEl.classList.remove('visible');
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#222';
        setStatus('▲▼ change style · side btn shoot');
        break;
      case 'sending':
        previewEl.style.display = 'block';
        tapHintEl.classList.remove('visible');
        overlayEl.classList.add('visible');
        overlayText.textContent = 'Sending to r1…';
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#884400';
        setStatus('sending…');
        break;
      case 'processing':
        overlayText.textContent = 'r1 is transforming…';
        appEl.style.borderColor = '#334499';
        setStatus('processing on device…');
        break;
      case 'done':
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#226622';
        setStatus('done · result in r1 gallery');
        break;
      case 'error':
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#662222';
        break;
    }
  }

  function setStatus(msg)      { statusEl.textContent = msg; }
  function updateStyleLabel()  { styleNameEl.textContent = STYLES[styleIndex].name; }

  // ─── Init camera ──────────────────────────────────────────────────────────
  // Uses .then()/.catch() — no async/await — to avoid any Promise stall on
  // rabbitOS. play() is called inside onloadedmetadata, not awaited.
  function init() {
    if (cameraReady || initInProgress) return;
    initInProgress = true;
    setStatus('starting camera…');

    navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:      { ideal: 640 },
        height:     { ideal: 480 }
      }
    })
    .then(function(stream) {
      videoEl.srcObject = stream;

      videoEl.onloadedmetadata = function() {
        // Call play() directly here — this callback is the closest we can
        // get to a synchronous user-gesture chain on rabbitOS.
        // If play() is still blocked, the browser shows its native Play symbol;
        // the tap-hint overlay will prompt the user to tap to unblock it.
        var playResult = videoEl.play();

        if (playResult !== undefined) {
          playResult
            .then(function() {
              // play() succeeded
              initInProgress = false;
              cameraReady    = true;
              setState('live');
            })
            .catch(function() {
              // play() was blocked — show tap-to-play hint
              initInProgress = false;
              splashEl.style.display = 'none';
              tapHintEl.classList.add('visible');
              setStatus('tap screen to start camera');
              appEl.style.borderColor = '#555';
              state = 'live'; // allow touch handler to call play()
            });
        } else {
          // Old WebView — play() returns undefined, assume it worked
          initInProgress = false;
          cameraReady    = true;
          setState('live');
        }
      };
    })
    .catch(function(err) {
      initInProgress = false;
      console.error('Camera error:', err);
      splashEl.style.display = 'flex';
      splashSub.textContent  = 'Camera error — tap START to retry';
      splashSub.style.color  = '#c44';
      setStatus('camera error · tap START');
      appEl.style.borderColor = '#662222';
      state = 'splash';
    });
  }

  // ─── Tap-to-play — called when video is paused/blocked after init ─────────
  function tryPlay() {
    videoEl.play()
      .then(function() {
        cameraReady = true;
        tapHintEl.classList.remove('visible');
        setState('live');
      })
      .catch(function(err) {
        console.error('play() still blocked:', err);
        setStatus('tap screen to start camera');
      });
  }

  // ─── START button ─────────────────────────────────────────────────────────
  function onStart() {
    splashEl.style.display = 'none';
    state = 'live';
    init();
  }

  btnStart.addEventListener('click', onStart);
  btnStart.addEventListener('touchstart', function(e) {
    e.preventDefault();
    onStart();
  }, { passive: false });

  // ─── Hardware events ──────────────────────────────────────────────────────
  window.addEventListener('sideClick', function() {
    if (state === 'splash')                          { onStart(); return; }
    if (tapHintEl.classList.contains('visible'))     { tryPlay(); return; }
    if (!cameraReady)                                { init();    return; }
    shoot();
  });
  window.addEventListener('scrollDown', nextStyle);
  window.addEventListener('scrollUp',   prevStyle);

  // ─── Touch / click events ─────────────────────────────────────────────────
  document.body.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var t = e.target;

    // Splash — handled by btnStart listener
    if (t === splashEl || splashEl.contains(t)) return;

    // Tap-to-play hint or video area while paused
    if (tapHintEl.classList.contains('visible')) {
      tryPlay();
      return;
    }

    if (t === videoEl || t === tapHintEl) {
      if (!cameraReady) { init(); return; }
      shoot();
    }
    if (t === previewEl)                               shoot();
    if (t.id === 'btn-reset' || t.closest('#btn-reset')) reset();
    if (t.id === 'arr-up')                             prevStyle();
    if (t.id === 'arr-down')                           nextStyle();
  }, { passive: false });

  videoEl.addEventListener('click', function() {
    if (tapHintEl.classList.contains('visible')) { tryPlay(); return; }
    if (!cameraReady) { init(); return; }
    shoot();
  });
  btnReset.addEventListener('click', reset);
  document.getElementById('arr-up').addEventListener('click',   prevStyle);
  document.getElementById('arr-down').addEventListener('click', nextStyle);

  // ─── Capture & send ───────────────────────────────────────────────────────
  function shoot() {
    if (!cameraReady || state !== 'live') return;

    var canvas = document.createElement('canvas');
    canvas.width  = videoEl.videoWidth  || 640;
    canvas.height = videoEl.videoHeight || 480;
    canvas.getContext('2d').drawImage(videoEl, 0, 0);

    var dataUri = canvas.toDataURL('image/jpeg', 0.8);
    previewEl.src = dataUri;
    setState('sending');

    var style = STYLES[styleIndex];

    window.onPluginMessage = function(data) {
      if (data && data.status === 'processing') {
        setState('processing');
      } else if (data && data.status === 'complete') {
        clearTimeout(fallbackTimer);
        setState('done');
      } else if (data && data.error) {
        clearTimeout(fallbackTimer);
        setStatus('error: ' + data.error);
        setState('error');
      }
    };

    function onCustomEvent(e) {
      window.onPluginMessage && window.onPluginMessage(e.detail);
      window.removeEventListener('pluginMessage', onCustomEvent);
    }
    window.addEventListener('pluginMessage', onCustomEvent);

    if (isR1) {
      PluginMessageHandler.postMessage(JSON.stringify({
        message:     style.prompt,
        pluginId:    'com.r1.pixelart',
        imageBase64: dataUri
      }));
    } else {
      setTimeout(function() { window.onPluginMessage({ status: 'processing' }); }, 600);
      setTimeout(function() { window.onPluginMessage({ status: 'complete'   }); }, 3000);
    }

    var fallbackTimer = setTimeout(function() {
      if (state === 'sending' || state === 'processing') {
        setState('done');
        setStatus('sent · result in r1 gallery');
      }
    }, 15000);
  }

  // ─── Reset ────────────────────────────────────────────────────────────────
  function reset() {
    window.onPluginMessage = null;
    previewEl.style.display = 'none';
    setState('live');
  }

  // ─── Style cycling ────────────────────────────────────────────────────────
  function nextStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex + 1) % STYLES.length;
    updateStyleLabel();
  }

  function prevStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex - 1 + STYLES.length) % STYLES.length;
    updateStyleLabel();
  }

  // ─── Boot ─────────────────────────────────────────────────────────────────
  updateStyleLabel();
</script>
</body>
</html>
