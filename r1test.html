<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Simpsonizador</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #1a0a2e;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }

    #app {
      width: 240px;
      height: 282px;
      border: 4px solid #FFD700;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Header */
    #header {
      width: 100%;
      background: #FFD700;
      color: #1a0a2e;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      padding: 4px 0;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    /* Camera preview */
    #video {
      width: 228px;
      height: 160px;
      object-fit: cover;
      background: #000;
      display: block;
      flex-shrink: 0;
    }

    /* Status area */
    #status {
      width: 100%;
      text-align: center;
      font-size: 10px;
      padding: 3px 4px;
      min-height: 20px;
      color: #FFD700;
      flex-shrink: 0;
    }

    /* Buttons row */
    #controls {
      display: flex;
      flex-direction: row;
      gap: 6px;
      padding: 4px 6px;
      width: 100%;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 6px;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    #btnCapture {
      background: #FFD700;
      color: #1a0a2e;
    }

    #btnCapture:active { opacity: 0.75; }
    #btnCapture:disabled {
      background: #555;
      color: #999;
    }

    #btnSave {
      background: #00aa44;
      color: #fff;
    }

    #btnSave:active { opacity: 0.75; }
    #btnSave:disabled {
      background: #555;
      color: #999;
    }

    .btn-icon { font-size: 18px; }

    /* Overlay spinner shown while processing */
    #overlay {
      display: none;
      position: absolute;
      top: 26px; /* below header */
      left: 0;
      width: 228px;
      height: 160px;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
    }

    #overlay.visible { display: flex; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #overlayText {
      color: #FFD700;
      font-size: 11px;
      text-align: center;
      padding: 0 10px;
    }
  </style>
</head>
<body>
<div id="app">

  <div id="header">🍩 SIMPSONIZADOR</div>

  <!-- Live camera preview -->
  <video id="video" autoplay playsinline muted></video>

  <!-- Processing overlay (shown on top of video area) -->
  <div id="overlay">
    <div class="spinner"></div>
    <div id="overlayText">Transformando…</div>
  </div>

  <div id="status">Iniciando cámara…</div>

  <div id="controls">
    <button id="btnCapture" class="btn" disabled>
      <span class="btn-icon">📸</span>
      <span>Capturar</span>
    </button>
    <button id="btnSave" class="btn" disabled>
      <span class="btn-icon">📓</span>
      <span>Guardar</span>
    </button>
  </div>

</div>

<script>
  // ── Guards ────────────────────────────────────────────────────────────────
  const isR1 = typeof PluginMessageHandler !== 'undefined';

  // ── Elements ──────────────────────────────────────────────────────────────
  const video      = document.getElementById('video');
  const overlay    = document.getElementById('overlay');
  const overlayTxt = document.getElementById('overlayText');
  const statusEl   = document.getElementById('status');
  const btnCapture = document.getElementById('btnCapture');
  const btnSave    = document.getElementById('btnSave');
  const appEl      = document.getElementById('app');

  // ── State ─────────────────────────────────────────────────────────────────
  let cameraStream     = null;
  let lastCapturedUri  = null;  // base64 JPEG data URI of captured frame
  let transformDone    = false; // true once pixelart bridge says 'complete'

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(msg) { statusEl.textContent = msg; }

  function setBorderColor(hex) { appEl.style.borderColor = hex; }

  function showOverlay(msg) {
    overlayTxt.textContent = msg;
    overlay.classList.add('visible');
  }

  function hideOverlay() { overlay.classList.remove('visible'); }

  // ── Camera init ───────────────────────────────────────────────────────────
  async function startCamera() {
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      });
      video.srcObject = cameraStream;
      await new Promise(res => { video.onloadedmetadata = res; });
      video.play();
      setStatus('Listo. Pulsa Capturar.');
      setBorderColor('#FFD700');
      btnCapture.disabled = false;
    } catch (err) {
      setStatus('Error cámara: ' + err.message);
      setBorderColor('#ff3333');
    }
  }

  // ── Capture frame from video ──────────────────────────────────────────────
  function captureFrame() {
    const canvas = document.createElement('canvas');
    // Use full video resolution for best pixelart output
    canvas.width  = video.videoWidth  || 320;
    canvas.height = video.videoHeight || 240;
    canvas.getContext('2d').drawImage(video, 0, 0);
    return canvas.toDataURL('image/jpeg', 0.8);
  }

  // ── Send to com.r1.pixelart bridge ────────────────────────────────────────
  function simpsonize(imageDataUri) {
    if (!isR1) {
      // Desktop preview: fake the transformation flow
      setTimeout(() => {
        hideOverlay();
        setStatus('✅ Transformación OK (demo)');
        setBorderColor('#00aa44');
        btnSave.disabled = false;
        transformDone = true;
      }, 2000);
      return;
    }

    // Register response handler BEFORE sending
    window.onPluginMessage = function(data) {
      if (data.status === 'processing') {
        overlayTxt.textContent = 'IA trabajando…';
        setBorderColor('#ff8800');

      } else if (data.status === 'complete') {
        hideOverlay();
        setStatus('✅ ¡Simpsonizado! Guarda en Journal.');
        setBorderColor('#00aa44');
        btnCapture.disabled = false;
        btnSave.disabled = false;
        transformDone = true;

      } else if (data.error) {
        hideOverlay();
        setStatus('Error: ' + (data.error || 'desconocido'));
        setBorderColor('#ff3333');
        btnCapture.disabled = false;
      } else {
        // Unexpected — log raw for debug
        setStatus(JSON.stringify(data).substring(0, 60));
      }
    };

    PluginMessageHandler.postMessage(JSON.stringify({
      message:     'Take a picture in the style of a Simpsons cartoon.',
      pluginId:    'com.r1.pixelart',
      imageBase64: imageDataUri
    }));
  }

  // ── Save to Journal ───────────────────────────────────────────────────────
  function saveToJournal() {
    if (!isR1) {
      setStatus('Journal: solo disponible en r1.');
      return;
    }
    if (!lastCapturedUri) {
      setStatus('Primero captura una foto.');
      return;
    }

    // wantsJournalEntry saves the LLM response to the r1 Journal.
    // We embed the captured image in the message so the journal entry
    // includes a description + the image reference.
    window.onPluginMessage = function(data) {
      setStatus('📓 Guardado en Journal.');
      setBorderColor('#FFD700');
      btnSave.disabled = true;
    };

    PluginMessageHandler.postMessage(JSON.stringify({
      message: 'Esta foto fue transformada al estilo de los Simpsons.\nIMAGE_DATA_URI: ' + lastCapturedUri,
      useLLM:           true,
      wantsR1Response:  false,
      wantsJournalEntry: true
    }));
  }

  // ── Button events (addEventListener — never inline onclick) ───────────────
  btnCapture.addEventListener('click', function() {
    if (!cameraStream) { setStatus('Cámara no lista.'); return; }

    transformDone = false;
    btnSave.disabled = true;
    btnCapture.disabled = true;

    lastCapturedUri = captureFrame();
    showOverlay('Enviando a IA…');
    setStatus('Procesando…');
    setBorderColor('#ff8800');

    simpsonize(lastCapturedUri);
  });

  btnSave.addEventListener('click', function() {
    saveToJournal();
  });

  // ── Hardware button: PTT side click also triggers capture ─────────────────
  window.addEventListener('sideClick', function() {
    if (!btnCapture.disabled) btnCapture.click();
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  startCamera();
</script>
</body>
</html>
