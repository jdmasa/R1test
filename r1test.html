<!DOCTYPE html>
<!--
  pixelart-cam — Rabbit R1 Creation
  Captures a photo, sends it to the r1 pixelart bridge for AI style transformation.

  IMPORTANT — how this bridge works:
  - You send: message (style prompt) + pluginId:"com.r1.pixelart" + imageBase64
  - Bridge responds with status:"processing" back to window.onPluginMessage
  - The GENERATED IMAGE is delivered by rabbitOS to its own image viewer/gallery
    — it does NOT come back to this WebView as base64 or any other format
  - status:"complete" may or may not fire back into the WebView
  - This Creation shows the captured freeze-frame as a "before" preview,
    a spinner while processing, and a reset button. That is the full loop.

  FIX (v2):
  - Added `cameraReady` flag so that shoot() is a no-op until getUserMedia
    has resolved and the video stream is live. This prevents longPressStart
    (which rabbitOS fires on plugin load, before init() finishes) from
    capturing a blank frame and locking the UI in 'sending' state.
  - Removed window.addEventListener('longPressStart', shoot) — longPressStart
    is a startup event on rabbitOS, not a reliable shoot trigger.
  - init() now only calls setState('live') if state hasn't been changed by
    something else in the meantime.

  FIX (v3):
  - init() is now safely re-callable via an `initInProgress` guard, so
    touch/sideClick retries never stack concurrent getUserMedia calls.
  - sideClick and video tap now call init() instead of shoot() when the
    camera isn't ready yet.
  - Status message updated to "tap screen to enable camera" on camera error.

  FIX (v4):
  - Added a full-screen splash screen with a START button as the very first
    thing the user sees. getUserMedia is only called AFTER the user taps START,
    guaranteeing a real user gesture precedes the camera request. This is the
    most reliable fix for rabbitOS WebView's media permission gate.
  - On camera error the splash is restored so the user can tap START to retry.
  - sideClick on the splash screen also triggers START (acts as user gesture).
  - Nothing camera-related runs automatically on page load.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixelart Cam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }

    #app {
      width: 240px;
      height: 282px;
      border: 4px solid #222;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: border-color 0.2s ease;
    }

    /* ── Splash screen ────────────────────────────────────────────────────── */
    #splash {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 282px;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 100;
    }

    #splash-title {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
    }

    #splash-sub {
      font-size: 9px;
      color: #555;
      text-align: center;
      line-height: 1.6;
      padding: 0 20px;
    }

    #btn-start {
      margin-top: 6px;
      width: 120px;
      height: 36px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: uppercase;
    }

    #btn-start:active {
      background: #ccc;
    }

    /* ── Camera / preview layer ─────────────────────────────────────────────*/
    #video, #preview {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      object-fit: cover;
    }

    #preview {
      display: none;
    }

    /* ── Style label strip ───────────────────────────────────────────────── */
    #style-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 22px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      display: flex;
      align-items: center;
      padding: 0 8px;
      pointer-events: none;
    }

    #style-name {
      font-size: 10px;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Processing overlay ──────────────────────────────────────────────── */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      background: rgba(0,0,0,0.65);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #overlay.visible {
      display: flex;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #6af;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #overlay-text {
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }

    /* ── Bottom bar ──────────────────────────────────────────────────────── */
    #bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 38px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 6px;
    }

    #status {
      flex: 1;
      font-size: 9px;
      color: #888;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #arr-up, #arr-down {
      font-size: 14px;
      color: #444;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      user-select: none;
    }

    #btn-reset {
      display: none;
      height: 28px;
      padding: 0 10px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #aaa;
      font-family: monospace;
      font-size: 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    #btn-reset.visible {
      display: block;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Splash — visible on load, dismissed only by user tapping START -->
  <div id="splash">
    <div id="splash-title">✦ Pixelart Cam</div>
    <div id="splash-sub">15 AI styles · scroll ▲▼ to pick<br>side button to shoot</div>
    <button id="btn-start">START</button>
  </div>

  <!-- Camera and preview (hidden until splash dismissed) -->
  <video id="video" autoplay playsinline muted style="display:none"></video>
  <img   id="preview" alt="captured">

  <!-- Style name overlay -->
  <div id="style-strip">
    <span id="style-name">SIMPSONS</span>
  </div>

  <!-- Processing spinner overlay -->
  <div id="overlay">
    <div class="spinner"></div>
    <div id="overlay-text">Sending to r1…</div>
  </div>

  <!-- Bottom bar -->
  <div id="bar">
    <span id="arr-up">▲</span>
    <span id="status">tap START to begin</span>
    <span id="arr-down">▼</span>
    <button id="btn-reset">↺ retake</button>
  </div>

</div>
<script>
  // ─── R1 detection ─────────────────────────────────────────────────────────
  const isR1 = typeof PluginMessageHandler !== 'undefined';

  // ─── Style list ───────────────────────────────────────────────────────────
  const STYLES = [
    { name: 'SIMPSONS',    prompt: 'Take a picture in the style of a Simpsons cartoon.' },
    { name: 'GHIBLI',      prompt: 'Take a picture in the Studio Ghibli anime style — soft colors, whimsical atmosphere, and hand-drawn aesthetic.' },
    { name: 'PIXAR',       prompt: 'Take a picture in the style of Pixar Animation.' },
    { name: 'MINECRAFT',   prompt: 'Take a picture in the style of Minecraft.' },
    { name: 'LEGO',        prompt: 'Take a picture and make it LEGO minifigures.' },
    { name: 'WATERCOLOR',  prompt: 'Take a picture in the style of a Watercolor painting.' },
    { name: 'CYBERPUNK',   prompt: 'Take a picture in a cyberpunk style with neon colors, tech elements, and futuristic vibes.' },
    { name: 'COMIC',       prompt: 'Take a picture and make the subject a superhero in a comic book with several frames.' },
    { name: 'FUNKO POP',   prompt: 'Take a picture and turn the subject into a Funko Pop.' },
    { name: 'WARHOL',      prompt: 'Take a picture in the style of Andy Warhol — pop art with four duplicated images in a frame.' },
    { name: 'RENAISSANCE', prompt: 'Take a picture in the style of a Renaissance Painting with depth, realism, and natural light.' },
    { name: 'WANTED',      prompt: 'Take a picture in the style of an Old West Wanted Poster. The poster title is WANTED.' },
    { name: 'TIME COVER',  prompt: 'Take a picture in the style of a polished TIME magazine cover. The title is PERSON OF THE YEAR.' },
    { name: 'SOUTH PARK',  prompt: 'Take a picture in the style of a South Park cartoon.' },
    { name: 'PERFECT',     prompt: 'Take a picture and make it picture perfect — improve lighting, colors, and overall composition. Make it photorealistic. 8k resolution.' },
  ];

  let styleIndex = 0;

  // ─── State ────────────────────────────────────────────────────────────────
  // 'splash'     — splash screen visible, camera not started
  // 'live'       — camera running, ready to shoot
  // 'sending'    — captured, spinner up, sent to bridge
  // 'processing' — bridge acknowledged, waiting
  // 'done'       — complete (or fallback timeout), reset available
  // 'error'      — bridge/camera error, reset available
  let state = 'splash';

  // Camera readiness flags
  let cameraReady    = false;
  let initInProgress = false;

  // ─── DOM refs ─────────────────────────────────────────────────────────────
  const appEl       = document.getElementById('app');
  const splashEl    = document.getElementById('splash');
  const splashSub   = document.getElementById('splash-sub');
  const btnStart    = document.getElementById('btn-start');
  const videoEl     = document.getElementById('video');
  const previewEl   = document.getElementById('preview');
  const overlayEl   = document.getElementById('overlay');
  const overlayText = document.getElementById('overlay-text');
  const styleNameEl = document.getElementById('style-name');
  const statusEl    = document.getElementById('status');
  const btnReset    = document.getElementById('btn-reset');

  // ─── UI helpers ───────────────────────────────────────────────────────────
  function setState(s) {
    state = s;
    switch (s) {
      case 'live':
        splashEl.style.display  = 'none';
        videoEl.style.display   = 'block';
        previewEl.style.display = 'none';
        overlayEl.classList.remove('visible');
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#222';
        setStatus('▲▼ change style · side btn shoot');
        break;
      case 'sending':
        videoEl.style.display   = 'none';
        previewEl.style.display = 'block';
        overlayEl.classList.add('visible');
        overlayText.textContent = 'Sending to r1…';
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#884400';
        setStatus('sending…');
        break;
      case 'processing':
        overlayText.textContent = 'r1 is transforming…';
        appEl.style.borderColor = '#334499';
        setStatus('processing on device…');
        break;
      case 'done':
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#226622';
        setStatus('done · result in r1 gallery');
        break;
      case 'error':
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#662222';
        break;
    }
  }

  function setStatus(msg) { statusEl.textContent = msg; }
  function updateStyleLabel() { styleNameEl.textContent = STYLES[styleIndex].name; }

  // ─── Init camera ──────────────────────────────────────────────────────────
  // ONLY called from a confirmed user gesture. Never called automatically.
  async function init() {
    if (cameraReady || initInProgress) return;
    initInProgress = true;
    setStatus('starting camera…');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      });
      videoEl.srcObject = stream;
      await new Promise(resolve => { videoEl.onloadedmetadata = resolve; });
      await videoEl.play();
      initInProgress = false;
      cameraReady    = true;
      setState('live');
    } catch (err) {
      initInProgress = false;
      // Restore splash so the user can tap START again to retry
      splashEl.style.display = 'flex';
      splashSub.textContent  = 'Camera error — tap START to retry';
      splashSub.style.color  = '#c44';
      setStatus('camera error · tap START');
      appEl.style.borderColor = '#662222';
      state = 'splash';
    }
  }

  // ─── START button ─────────────────────────────────────────────────────────
  // FIX v4: this is the ONLY place getUserMedia is initiated. The tap on START
  // is an unambiguous user gesture, satisfying rabbitOS WebView's media gate.
  function onStart() {
    splashEl.style.display = 'none';
    state = 'live'; // set before init() so the guard doesn't bail
    init();
  }

  btnStart.addEventListener('click', onStart);
  btnStart.addEventListener('touchstart', e => {
    e.preventDefault();
    onStart();
  }, { passive: false });

  // ─── Hardware events ──────────────────────────────────────────────────────
  window.addEventListener('sideClick', () => {
    if (state === 'splash') { onStart(); return; }   // START from side button
    if (!cameraReady)       { init();    return; }   // retry init
    shoot();
  });
  window.addEventListener('scrollDown', nextStyle);
  window.addEventListener('scrollUp',   prevStyle);

  // ─── Touch events ─────────────────────────────────────────────────────────
  document.body.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.target;
    // Splash START button is handled by its own listener above;
    // swallow touches on the splash so they don't fall through.
    if (t === splashEl || splashEl.contains(t)) return;
    if (t === videoEl || t === previewEl) {
      if (!cameraReady) { init(); return; }
      shoot();
    }
    if (t.id === 'btn-reset' || t.closest('#btn-reset')) reset();
    if (t.id === 'arr-up')   prevStyle();
    if (t.id === 'arr-down') nextStyle();
  }, { passive: false });

  // Desktop click fallbacks
  videoEl.addEventListener('click', () => {
    if (!cameraReady) { init(); return; }
    shoot();
  });
  btnReset.addEventListener('click', reset);
  document.getElementById('arr-up').addEventListener('click',   prevStyle);
  document.getElementById('arr-down').addEventListener('click', nextStyle);

  // ─── Capture & send ───────────────────────────────────────────────────────
  function shoot() {
    if (!cameraReady || state !== 'live') return;

    const canvas = document.createElement('canvas');
    canvas.width  = videoEl.videoWidth  || 640;
    canvas.height = videoEl.videoHeight || 480;
    canvas.getContext('2d').drawImage(videoEl, 0, 0);

    const dataUri = canvas.toDataURL('image/jpeg', 0.8);
    previewEl.src = dataUri;
    setState('sending');

    const style = STYLES[styleIndex];

    window.onPluginMessage = function(data) {
      if (data && data.status === 'processing') {
        setState('processing');
      } else if (data && data.status === 'complete') {
        clearTimeout(fallbackTimer);
        setState('done');
      } else if (data && data.error) {
        clearTimeout(fallbackTimer);
        setStatus('error: ' + data.error);
        setState('error');
      }
    };

    function onCustomEvent(e) {
      window.onPluginMessage && window.onPluginMessage(e.detail);
      window.removeEventListener('pluginMessage', onCustomEvent);
    }
    window.addEventListener('pluginMessage', onCustomEvent);

    if (isR1) {
      PluginMessageHandler.postMessage(JSON.stringify({
        message:     style.prompt,
        pluginId:    'com.r1.pixelart',
        imageBase64: dataUri
      }));
    } else {
      // Desktop simulation
      setTimeout(() => { window.onPluginMessage({ status: 'processing' }); }, 600);
      setTimeout(() => { window.onPluginMessage({ status: 'complete'   }); }, 3000);
    }

    const fallbackTimer = setTimeout(() => {
      if (state === 'sending' || state === 'processing') {
        setState('done');
        setStatus('sent · result in r1 gallery');
      }
    }, 15000);
  }

  // ─── Reset to live camera ─────────────────────────────────────────────────
  function reset() {
    window.onPluginMessage = null;
    setState('live');
  }

  // ─── Style cycling ────────────────────────────────────────────────────────
  function nextStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex + 1) % STYLES.length;
    updateStyleLabel();
  }

  function prevStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex - 1 + STYLES.length) % STYLES.length;
    updateStyleLabel();
  }

  // ─── Boot — nothing camera-related, just set the style label ──────────────
  updateStyleLabel();
</script>
</body>
</html>
