<!DOCTYPE html>
<!--
  pixelart-cam — Rabbit R1 Creation

  FIX HISTORY:
  v2 — cameraReady flag; removed longPressStart
  v3 — initInProgress guard; sideClick retries init
  v4 — splash screen with START button for guaranteed user gesture
  v5 — matched ref.js: no `muted`, onloadedmetadata callback, `ideal` constraints
  v6 — video never hidden; tap-to-play fallback overlay
  v7 — WRONG: removed play() entirely; autoplay alone not enough on rabbitOS
  v8 — THE CORRECT FIX:
       getUserMedia is called immediately on DOMContentLoaded (like ref.js),
       so the stream is ready and waiting before the user even sees the splash.
       The START button's sole job is to call videoEl.play() synchronously
       inside the touchstart handler — that one call is all that needs a user
       gesture on rabbitOS. Stream setup and play() are now decoupled:
         · stream setup: happens in background on page load (no gesture needed)
         · play(): happens instantly on START tap (gesture-gated, but instant)
       This matches ref.js behaviour exactly and eliminates the wait.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixelart Cam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }

    #app {
      width: 240px;
      height: 282px;
      border: 4px solid #222;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: border-color 0.2s ease;
    }

    /* Video always in DOM, never hidden */
    #video {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      object-fit: cover;
      z-index: 0;
      background: #000;
    }

    #preview {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      object-fit: cover;
      display: none;
      z-index: 1;
    }

    /* ── Style label strip ── */
    #style-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 22px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      display: flex;
      align-items: center;
      padding: 0 8px;
      pointer-events: none;
      z-index: 3;
    }

    #style-name {
      font-size: 10px;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Processing overlay ── */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      background: rgba(0,0,0,0.65);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 3;
    }

    #overlay.visible { display: flex; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #6af;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #overlay-text {
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }

    /* ── Bottom bar ── */
    #bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 38px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 6px;
      z-index: 3;
    }

    #status {
      flex: 1;
      font-size: 9px;
      color: #888;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #arr-up, #arr-down {
      font-size: 14px;
      color: #444;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      user-select: none;
    }

    #btn-reset {
      display: none;
      height: 28px;
      padding: 0 10px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #aaa;
      font-family: monospace;
      font-size: 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    #btn-reset.visible { display: block; }

    /* ── Splash — on top of everything ── */
    #splash {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 282px;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 100;
    }

    #splash-title {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
    }

    #splash-sub {
      font-size: 9px;
      color: #555;
      text-align: center;
      line-height: 1.6;
      padding: 0 20px;
    }

    #btn-start {
      margin-top: 6px;
      width: 120px;
      height: 36px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: uppercase;
    }

    #btn-start:active { background: #ccc; }
  </style>
</head>
<body>
<div id="app">

  <!-- Video always present. play() is called from the START gesture. -->
  <video id="video" playsinline></video>

  <img id="preview" alt="captured">

  <div id="style-strip">
    <span id="style-name">SIMPSONS</span>
  </div>

  <div id="overlay">
    <div class="spinner"></div>
    <div id="overlay-text">Sending to r1…</div>
  </div>

  <div id="bar">
    <span id="arr-up">▲</span>
    <span id="status">tap START to begin</span>
    <span id="arr-down">▼</span>
    <button id="btn-reset">↺ retake</button>
  </div>

  <!-- Splash on top — removed when user taps START -->
  <div id="splash">
    <div id="splash-title">✦ Pixelart Cam</div>
    <div id="splash-sub">15 AI styles · scroll ▲▼ to pick<br>side button to shoot</div>
    <button id="btn-start">START</button>
  </div>

</div>
<script>
  const isR1 = typeof PluginMessageHandler !== 'undefined';

  const STYLES = [
    { name: 'SIMPSONS',    prompt: 'Take a picture in the style of a Simpsons cartoon.' },
    { name: 'GHIBLI',      prompt: 'Take a picture in the Studio Ghibli anime style — soft colors, whimsical atmosphere, and hand-drawn aesthetic.' },
    { name: 'PIXAR',       prompt: 'Take a picture in the style of Pixar Animation.' },
    { name: 'MINECRAFT',   prompt: 'Take a picture in the style of Minecraft.' },
    { name: 'LEGO',        prompt: 'Take a picture and make it LEGO minifigures.' },
    { name: 'WATERCOLOR',  prompt: 'Take a picture in the style of a Watercolor painting.' },
    { name: 'CYBERPUNK',   prompt: 'Take a picture in a cyberpunk style with neon colors, tech elements, and futuristic vibes.' },
    { name: 'COMIC',       prompt: 'Take a picture and make the subject a superhero in a comic book with several frames.' },
    { name: 'FUNKO POP',   prompt: 'Take a picture and turn the subject into a Funko Pop.' },
    { name: 'WARHOL',      prompt: 'Take a picture in the style of Andy Warhol — pop art with four duplicated images in a frame.' },
    { name: 'RENAISSANCE', prompt: 'Take a picture in the style of a Renaissance Painting with depth, realism, and natural light.' },
    { name: 'WANTED',      prompt: 'Take a picture in the style of an Old West Wanted Poster. The poster title is WANTED.' },
    { name: 'TIME COVER',  prompt: 'Take a picture in the style of a polished TIME magazine cover. The title is PERSON OF THE YEAR.' },
    { name: 'SOUTH PARK',  prompt: 'Take a picture in the style of a South Park cartoon.' },
    { name: 'PERFECT',     prompt: 'Take a picture and make it picture perfect — improve lighting, colors, and overall composition. Make it photorealistic. 8k resolution.' },
  ];

  let styleIndex  = 0;
  let state       = 'splash';
  let cameraReady = false;
  let streamReady = false; // stream is attached, waiting for play() gesture

  const appEl       = document.getElementById('app');
  const splashEl    = document.getElementById('splash');
  const splashSub   = document.getElementById('splash-sub');
  const btnStart    = document.getElementById('btn-start');
  const videoEl     = document.getElementById('video');
  const previewEl   = document.getElementById('preview');
  const overlayEl   = document.getElementById('overlay');
  const overlayText = document.getElementById('overlay-text');
  const styleNameEl = document.getElementById('style-name');
  const statusEl    = document.getElementById('status');
  const btnReset    = document.getElementById('btn-reset');

  function setState(s) {
    state = s;
    switch (s) {
      case 'live':
        splashEl.style.display  = 'none';
        previewEl.style.display = 'none';
        overlayEl.classList.remove('visible');
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#222';
        setStatus('▲▼ change style · side btn shoot');
        break;
      case 'sending':
        previewEl.style.display = 'block';
        overlayEl.classList.add('visible');
        overlayText.textContent = 'Sending to r1…';
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#884400';
        setStatus('sending…');
        break;
      case 'processing':
        overlayText.textContent = 'r1 is transforming…';
        appEl.style.borderColor = '#334499';
        setStatus('processing on device…');
        break;
      case 'done':
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#226622';
        setStatus('done · result in r1 gallery');
        break;
      case 'error':
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#662222';
        break;
    }
  }

  function setStatus(msg)     { statusEl.textContent = msg; }
  function updateStyleLabel() { styleNameEl.textContent = STYLES[styleIndex].name; }

  // ─── Step 1: getUserMedia on page load ────────────────────────────────────
  // Called immediately from DOMContentLoaded — no gesture needed for this
  // part. Stream setup runs in the background while the splash is visible.
  // By the time the user reads the splash and taps START, the stream is
  // already attached and waiting. Only play() needs the gesture.
  function setupStream() {
    navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:      { ideal: 640 },
        height:     { ideal: 480 }
      }
    })
    .then(function(stream) {
      videoEl.srcObject = stream;
      videoEl.onloadedmetadata = function() {
        streamReady = true;
        // Update splash sub-text so user knows we're ready
        if (state === 'splash') {
          splashSub.textContent = 'Camera ready · tap START';
          splashSub.style.color = '#6a6';
        }
      };
    })
    .catch(function(err) {
      console.error('Camera error:', err);
      splashSub.textContent = 'Camera error — tap START to retry';
      splashSub.style.color = '#c44';
      setStatus('camera error');
    });
  }

  // ─── Step 2: play() called synchronously inside the START touch handler ───
  // This is the only gesture-gated operation. Because the stream is already
  // attached, play() starts the viewfinder instantly with no wait.
  function startPlay() {
    splashEl.style.display = 'none';
    state = 'live';

    if (!streamReady) {
      // Stream not ready yet (very fast tap) — wait for it then play
      setStatus('waiting for camera…');
      videoEl.onloadedmetadata = function() {
        streamReady = true;
        videoEl.play();
        cameraReady = true;
        setState('live');
      };
      // Also try playing now in case metadata already loaded silently
      videoEl.play();
      return;
    }

    videoEl.play();
    cameraReady = true;
    setState('live');
  }

  // ─── START button ─────────────────────────────────────────────────────────
  btnStart.addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    startPlay();
  }, { passive: false });

  btnStart.addEventListener('click', function(e) {
    e.stopPropagation();
    startPlay();
  });

  // ─── Hardware events ──────────────────────────────────────────────────────
  window.addEventListener('sideClick', function() {
    if (state === 'splash') { startPlay(); return; }
    if (!cameraReady)       { videoEl.play(); return; }
    shoot();
  });

  window.addEventListener('scrollDown', nextStyle);
  window.addEventListener('scrollUp',   prevStyle);

  // ─── Touch events ─────────────────────────────────────────────────────────
  document.body.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var t = e.target;
    if (t === splashEl || splashEl.contains(t)) return;
    if (t === videoEl || t === previewEl) {
      if (!cameraReady) { videoEl.play(); return; }
      shoot();
    }
    if (t.id === 'btn-reset' || t.closest('#btn-reset')) reset();
    if (t.id === 'arr-up')   prevStyle();
    if (t.id === 'arr-down') nextStyle();
  }, { passive: false });

  videoEl.addEventListener('click', function() {
    if (!cameraReady) { videoEl.play(); return; }
    shoot();
  });
  btnReset.addEventListener('click', reset);
  document.getElementById('arr-up').addEventListener('click',   prevStyle);
  document.getElementById('arr-down').addEventListener('click', nextStyle);

  // ─── Capture & send ───────────────────────────────────────────────────────
  function shoot() {
    if (!cameraReady || state !== 'live') return;

    var canvas = document.createElement('canvas');
    canvas.width  = videoEl.videoWidth  || 640;
    canvas.height = videoEl.videoHeight || 480;
    canvas.getContext('2d').drawImage(videoEl, 0, 0);

    var dataUri = canvas.toDataURL('image/jpeg', 0.8);
    previewEl.src = dataUri;
    setState('sending');

    var style = STYLES[styleIndex];

    window.onPluginMessage = function(data) {
      if (data && data.status === 'processing') {
        setState('processing');
      } else if (data && data.status === 'complete') {
        clearTimeout(fallbackTimer);
        setState('done');
      } else if (data && data.error) {
        clearTimeout(fallbackTimer);
        setStatus('error: ' + data.error);
        setState('error');
      }
    };

    function onCustomEvent(e) {
      window.onPluginMessage && window.onPluginMessage(e.detail);
      window.removeEventListener('pluginMessage', onCustomEvent);
    }
    window.addEventListener('pluginMessage', onCustomEvent);

    if (isR1) {
      PluginMessageHandler.postMessage(JSON.stringify({
        message:     style.prompt,
        pluginId:    'com.r1.pixelart',
        imageBase64: dataUri
      }));
    } else {
      setTimeout(function() { window.onPluginMessage({ status: 'processing' }); }, 600);
      setTimeout(function() { window.onPluginMessage({ status: 'complete'   }); }, 3000);
    }

    var fallbackTimer = setTimeout(function() {
      if (state === 'sending' || state === 'processing') {
        setState('done');
        setStatus('sent · result in r1 gallery');
      }
    }, 15000);
  }

  // ─── Reset ────────────────────────────────────────────────────────────────
  function reset() {
    window.onPluginMessage  = null;
    previewEl.style.display = 'none';
    setState('live');
  }

  // ─── Style cycling ────────────────────────────────────────────────────────
  function nextStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex + 1) % STYLES.length;
    updateStyleLabel();
  }

  function prevStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex - 1 + STYLES.length) % STYLES.length;
    updateStyleLabel();
  }

  // ─── Boot ─────────────────────────────────────────────────────────────────
  updateStyleLabel();

  document.addEventListener('DOMContentLoaded', function() {
    setupStream(); // start getUserMedia immediately — no gesture needed
  });

  // If DOMContentLoaded already fired (script at end of body), run now
  if (document.readyState === 'interactive' || document.readyState === 'complete') {
    setupStream();
  }
</script>
</body>
</html>
