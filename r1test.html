<!DOCTYPE html>
<!--
  pixelart-cam — Rabbit R1 Creation

  v12 — key insight from diagnostics:
  · The native browser "Play" button is a browser UI element, not a DOM node.
    Our body touchstart handler was calling e.preventDefault() which killed
    the native tap before the browser could act on it — so tapping did nothing.
  · On rabbitOS, sideClick is the reliable user gesture that unblocks play().
  · Fix: sideClick ALWAYS calls videoEl.play() as its very first action.
    If the camera isn't playing yet, this unblocks it. If it's already
    playing, play() on an already-playing video is a safe no-op.
  · body touchstart no longer calls e.preventDefault() globally — native
    browser UI (Play button) can now respond to taps normally.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixelart Cam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }

    #app {
      width: 240px;
      height: 282px;
      border: 4px solid #222;
      position: relative;
      transition: border-color 0.2s ease;
    }

    #video {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      object-fit: cover;
      background: #000;
    }

    #preview {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      object-fit: cover;
      display: none;
      z-index: 1;
    }

    #style-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 22px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      display: flex;
      align-items: center;
      padding: 0 8px;
      pointer-events: none;
      z-index: 3;
    }

    #style-name {
      font-size: 10px;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      background: rgba(0,0,0,0.65);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 3;
    }

    #overlay.visible { display: flex; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #6af;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #overlay-text {
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }

    #bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 38px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 6px;
      z-index: 3;
    }

    #status {
      flex: 1;
      font-size: 9px;
      color: #888;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #arr-up, #arr-down {
      font-size: 14px;
      color: #444;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      user-select: none;
    }

    #btn-reset {
      display: none;
      height: 28px;
      padding: 0 10px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #aaa;
      font-family: monospace;
      font-size: 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    #btn-reset.visible { display: block; }
  </style>
</head>
<body>
<div id="app">

  <video id="video" playsinline></video>
  <img   id="preview" alt="captured">

  <div id="style-strip">
    <span id="style-name">SIMPSONS</span>
  </div>

  <div id="overlay">
    <div class="spinner"></div>
    <div id="overlay-text">Sending to r1…</div>
  </div>

  <div id="bar">
    <span id="arr-up">▲</span>
    <span id="status">press side button to start</span>
    <span id="arr-down">▼</span>
    <button id="btn-reset">↺ retake</button>
  </div>

</div>
<script>
  var isR1 = typeof PluginMessageHandler !== 'undefined';

  var STYLES = [
    { name: 'SIMPSONS',    prompt: 'Take a picture in the style of a Simpsons cartoon.' },
    { name: 'GHIBLI',      prompt: 'Take a picture in the Studio Ghibli anime style — soft colors, whimsical atmosphere, and hand-drawn aesthetic.' },
    { name: 'PIXAR',       prompt: 'Take a picture in the style of Pixar Animation.' },
    { name: 'MINECRAFT',   prompt: 'Take a picture in the style of Minecraft.' },
    { name: 'LEGO',        prompt: 'Take a picture and make it LEGO minifigures.' },
    { name: 'WATERCOLOR',  prompt: 'Take a picture in the style of a Watercolor painting.' },
    { name: 'CYBERPUNK',   prompt: 'Take a picture in a cyberpunk style with neon colors, tech elements, and futuristic vibes.' },
    { name: 'COMIC',       prompt: 'Take a picture and make the subject a superhero in a comic book with several frames.' },
    { name: 'FUNKO POP',   prompt: 'Take a picture and turn the subject into a Funko Pop.' },
    { name: 'WARHOL',      prompt: 'Take a picture in the style of Andy Warhol — pop art with four duplicated images in a frame.' },
    { name: 'RENAISSANCE', prompt: 'Take a picture in the style of a Renaissance Painting with depth, realism, and natural light.' },
    { name: 'WANTED',      prompt: 'Take a picture in the style of an Old West Wanted Poster. The poster title is WANTED.' },
    { name: 'TIME COVER',  prompt: 'Take a picture in the style of a polished TIME magazine cover. The title is PERSON OF THE YEAR.' },
    { name: 'SOUTH PARK',  prompt: 'Take a picture in the style of a South Park cartoon.' },
    { name: 'PERFECT',     prompt: 'Take a picture and make it picture perfect — improve lighting, colors, and overall composition. Make it photorealistic. 8k resolution.' },
  ];

  var styleIndex  = 0;
  var state       = 'live';
  var cameraReady = false;

  var appEl       = document.getElementById('app');
  var videoEl     = document.getElementById('video');
  var previewEl   = document.getElementById('preview');
  var overlayEl   = document.getElementById('overlay');
  var overlayText = document.getElementById('overlay-text');
  var styleNameEl = document.getElementById('style-name');
  var statusEl    = document.getElementById('status');
  var btnReset    = document.getElementById('btn-reset');

  function setStatus(msg)     { statusEl.textContent = msg; }
  function updateStyleLabel() { styleNameEl.textContent = STYLES[styleIndex].name; }

  // ── Camera init ───────────────────────────────────────────────────────────
  function initCamera() {
    navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:      { ideal: 640 },
        height:     { ideal: 480 }
      }
    })
    .then(function(stream) {
      videoEl.srcObject = stream;
      videoEl.onloadedmetadata = function() {
        // Attempt play — may need user gesture on rabbitOS
        var p = videoEl.play();
        if (p !== undefined) {
          p.then(function() {
            onCameraLive();
          }).catch(function() {
            // Blocked — status bar tells user to press side button
            setStatus('press side button to start');
          });
        } else {
          onCameraLive();
        }
      };
    })
    .catch(function(err) {
      setStatus('camera error: ' + err.message);
    });
  }

  function onCameraLive() {
    cameraReady = true;
    setStatus('▲▼ change style · side btn shoot');
  }

  // ── sideClick: ALWAYS tries play() first, then shoots if already live ─────
  // This is the key fix: on rabbitOS, sideClick is a trusted user gesture.
  // Calling play() here unblocks the video if it's paused, and is a safe
  // no-op if the video is already playing. So the first sideClick starts
  // the camera; subsequent ones shoot.
  window.addEventListener('sideClick', function() {
    if (!cameraReady) {
      // Try to unblock play with this gesture
      videoEl.play().then(function() {
        onCameraLive();
      }).catch(function() {
        setStatus('press side button to start');
      });
      return;
    }
    shoot();
  });

  window.addEventListener('scrollDown', nextStyle);
  window.addEventListener('scrollUp',   prevStyle);

  // ── Touch events — NO e.preventDefault() globally ─────────────────────────
  // Removed global preventDefault so the browser's native Play button on the
  // video element can respond to taps without being intercepted.
  // Only call preventDefault on specific interactive elements we own.
  videoEl.addEventListener('touchstart', function(e) {
    if (!cameraReady) {
      // Let the native play button work AND try our play() call
      videoEl.play().then(onCameraLive).catch(function() {});
      return;
    }
    e.preventDefault();
    shoot();
  }, { passive: false });

  previewEl.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (cameraReady) shoot();
  }, { passive: false });

  btnReset.addEventListener('touchstart', function(e) {
    e.preventDefault();
    reset();
  }, { passive: false });

  document.getElementById('arr-up').addEventListener('touchstart', function(e) {
    e.preventDefault();
    prevStyle();
  }, { passive: false });

  document.getElementById('arr-down').addEventListener('touchstart', function(e) {
    e.preventDefault();
    nextStyle();
  }, { passive: false });

  // Desktop click fallbacks
  videoEl.addEventListener('click',   function() { if (cameraReady) shoot(); });
  btnReset.addEventListener('click',  reset);
  document.getElementById('arr-up').addEventListener('click',   prevStyle);
  document.getElementById('arr-down').addEventListener('click', nextStyle);

  // ── Capture & send ────────────────────────────────────────────────────────
  function shoot() {
    if (!cameraReady || state !== 'live') return;

    var canvas = document.createElement('canvas');
    canvas.width  = videoEl.videoWidth  || 640;
    canvas.height = videoEl.videoHeight || 480;
    canvas.getContext('2d').drawImage(videoEl, 0, 0);

    var dataUri = canvas.toDataURL('image/jpeg', 0.8);
    previewEl.src = dataUri;

    state = 'sending';
    previewEl.style.display = 'block';
    overlayEl.classList.add('visible');
    overlayText.textContent = 'Sending to r1…';
    btnReset.classList.remove('visible');
    appEl.style.borderColor = '#884400';
    setStatus('sending…');

    var style = STYLES[styleIndex];

    window.onPluginMessage = function(data) {
      if (data && data.status === 'processing') {
        overlayText.textContent = 'r1 is transforming…';
        appEl.style.borderColor = '#334499';
        setStatus('processing on device…');
        state = 'processing';
      } else if (data && data.status === 'complete') {
        clearTimeout(fallbackTimer);
        done();
      } else if (data && data.error) {
        clearTimeout(fallbackTimer);
        setStatus('error: ' + data.error);
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#662222';
        state = 'error';
      }
    };

    function onCustomEvent(e) {
      window.onPluginMessage && window.onPluginMessage(e.detail);
      window.removeEventListener('pluginMessage', onCustomEvent);
    }
    window.addEventListener('pluginMessage', onCustomEvent);

    if (isR1) {
      PluginMessageHandler.postMessage(JSON.stringify({
        message:     style.prompt,
        pluginId:    'com.r1.pixelart',
        imageBase64: dataUri
      }));
    } else {
      setTimeout(function() { window.onPluginMessage({ status: 'processing' }); }, 600);
      setTimeout(function() { window.onPluginMessage({ status: 'complete'   }); }, 3000);
    }

    var fallbackTimer = setTimeout(function() {
      if (state === 'sending' || state === 'processing') done();
    }, 15000);
  }

  function done() {
    overlayEl.classList.remove('visible');
    btnReset.classList.add('visible');
    appEl.style.borderColor = '#226622';
    setStatus('done · result in r1 gallery');
    state = 'done';
  }

  // ── Reset ─────────────────────────────────────────────────────────────────
  function reset() {
    window.onPluginMessage  = null;
    previewEl.style.display = 'none';
    overlayEl.classList.remove('visible');
    btnReset.classList.remove('visible');
    appEl.style.borderColor = '#222';
    setStatus('▲▼ change style · side btn shoot');
    state = 'live';
  }

  // ── Style cycling ─────────────────────────────────────────────────────────
  function nextStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex + 1) % STYLES.length;
    updateStyleLabel();
  }

  function prevStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex - 1 + STYLES.length) % STYLES.length;
    updateStyleLabel();
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  updateStyleLabel();
  document.addEventListener('DOMContentLoaded', initCamera);
  if (document.readyState !== 'loading') initCamera();
</script>
</body>
</html>
