<!DOCTYPE html>
<!--
  pixelart-cam — Rabbit R1 Creation
  Captures a photo, sends it to the r1 pixelart bridge for AI style transformation.

  IMPORTANT — how this bridge works:
  - You send: message (style prompt) + pluginId:"com.r1.pixelart" + imageBase64
  - Bridge responds with status:"processing" back to window.onPluginMessage
  - The GENERATED IMAGE is delivered by rabbitOS to its own image viewer/gallery
    — it does NOT come back to this WebView as base64 or any other format
  - status:"complete" may or may not fire back into the WebView
  - This Creation shows the captured freeze-frame as a "before" preview,
    a spinner while processing, and a reset button. That is the full loop.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixelart Cam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }

    #app {
      width: 240px;
      height: 282px;
      border: 4px solid #222;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: border-color 0.2s ease;
    }

    /* ── Boot screen ── */
    #boot-screen {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 282px;
      background: #000;
      border: 4px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 20px;
    }

    #boot-screen .boot-text {
      text-align: center;
      color: #888;
      font-family: monospace;
    }

    #boot-screen .boot-title {
      margin-bottom: 10px;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #boot-screen .boot-subtitle {
      font-size: 10px;
      color: #555;
    }

    #boot-button {
      padding: 10px 20px;
      background: #1a1a1a;
      border: 1px solid #444;
      color: #aaa;
      cursor: pointer;
      font-family: monospace;
      font-size: 10px;
      border-radius: 4px;
    }

    /* ── Camera / preview layer ── */
    #video, #preview {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      object-fit: cover;
    }

    #preview {
      display: none;
    }

    /* ── Style label strip ── */
    #style-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 22px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      display: flex;
      align-items: center;
      padding: 0 8px;
      pointer-events: none;
    }

    #style-name {
      font-size: 10px;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Processing overlay ── */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 240px;
      height: 240px;
      background: rgba(0,0,0,0.65);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #overlay.visible {
      display: flex;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #6af;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #overlay-text {
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }

    /* ── Bottom bar ── */
    #bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 38px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 6px;
    }

    #status {
      flex: 1;
      font-size: 9px;
      color: #888;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* Scroll wheel hint arrows */
    #arr-up, #arr-down {
      font-size: 14px;
      color: #444;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      user-select: none;
    }

    /* Reset button — shown while in preview state */
    #btn-reset {
      display: none;
      height: 28px;
      padding: 0 10px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #aaa;
      font-family: monospace;
      font-size: 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    #btn-reset.visible {
      display: block;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Boot screen - must tap to initialize plugin -->
  <div id="boot-screen">
    <div class="boot-text">
      <div class="boot-title">PIXELART CAM</div>
      <div class="boot-subtitle">tap to start</div>
    </div>
    <button id="boot-button">START</button>
  </div>

  <!-- Camera and preview images -->
  <video id="video" autoplay playsinline muted style="display: none;"></video>
  <img   id="preview" alt="captured">

  <!-- Current style name overlay at top -->
  <div id="style-strip">
    <span id="style-name">SIMPSONS</span>
  </div>

  <!-- Processing spinner overlay -->
  <div id="overlay">
    <div class="spinner"></div>
    <div id="overlay-text">Sending to r1…</div>
  </div>

  <!-- Bottom bar: status + scroll hints + reset -->
  <div id="bar">
    <span id="arr-up">▲</span>
    <span id="status">loading…</span>
    <span id="arr-down">▼</span>
    <button id="btn-reset">↺ retake</button>
  </div>

</div>
<script>
  // ─── Hardware Handler Class ───────────────────────────────────────────────
  class HardwareHandler {
    constructor() {
      this.sideButtonEnabled = true;
      this.scrollWheelEnabled = true;
      this.eventListeners = new Map();
    }

    init(options = {}) {
      this.sideButtonEnabled = options.sideButtonEnabled ?? true;
      this.scrollWheelEnabled = options.scrollWheelEnabled ?? true;
      if (this.sideButtonEnabled) this.setupSideButtonListener();
      if (this.scrollWheelEnabled) this.setupScrollWheelListener();
      if (options.keyboardFallback !== false) this.setupKeyboardFallback();
    }

    setupSideButtonListener() {
      window.addEventListener('sideClick', e => {
        if (this.sideButtonEnabled) this.handleSideButtonClick(e);
      });
    }

    setupScrollWheelListener() {
      window.addEventListener('scrollUp', e => {
        if (this.scrollWheelEnabled) this.handleScrollWheel({ direction: 'up', event: e });
      });
      window.addEventListener('scrollDown', e => {
        if (this.scrollWheelEnabled) this.handleScrollWheel({ direction: 'down', event: e });
      });
    }

    setupKeyboardFallback() {
      window.addEventListener('keydown', e => {
        if (e.code === 'Space') {
          e.preventDefault();
          window.dispatchEvent(new CustomEvent('sideClick', { detail: { source: 'keyboard' } }));
        }
      });
    }

    handleSideButtonClick(e) {
      (this.eventListeners.get('sideButton') || []).forEach(handler => handler(e));
    }

    handleScrollWheel(e) {
      (this.eventListeners.get('scrollWheel') || []).forEach(handler => handler({ direction: e.direction, event: e.event }));
    }

    on(event, handler) {
      if (!this.eventListeners.has(event)) this.eventListeners.set(event, []);
      this.eventListeners.get(event).push(handler);
    }
  }

  // ─── Plugin Bridge Class ──────────────────────────────────────────────────
  class PluginBridge {
    constructor() {
      this.isFlutterAvailable = this.checkFlutterAvailability();
      this.setupPluginMessageHandler();
    }

    checkFlutterAvailability() {
      return typeof window !== 'undefined' && (
        window.FlutterButtonHandler !== undefined ||
        window.closeWebView !== undefined ||
        window.PluginMessageHandler !== undefined ||
        window.TouchEventHandler !== undefined
      );
    }

    setupPluginMessageHandler() {
      if (typeof window !== 'undefined' && !window.onPluginMessage) {
        window.onPluginMessage = function(data) {
          window.dispatchEvent(new CustomEvent('pluginMessage', { detail: data }));
        };
      }
    }

    sendPluginMessage(data) {
      if (!window.PluginMessageHandler) {
        console.warn('PluginMessageHandler not available');
        return false;
      }
      try {
        window.PluginMessageHandler.postMessage(JSON.stringify(data));
        return true;
      } catch (err) {
        console.error('Failed to send plugin message:', err);
        return false;
      }
    }

    sendData(data) {
      if (!window.FlutterButtonHandler) return false;
      try {
        window.FlutterButtonHandler.postMessage(JSON.stringify(data));
        return true;
      } catch (err) {
        console.error('Failed to send data:', err);
        return false;
      }
    }

    onPluginMessage(callback) {
      if (typeof window !== 'undefined') {
        window.addEventListener('pluginMessage', e => callback(e.detail));
      }
    }
  }

  // ─── Initialize hardware and plugin handlers ──────────────────────────────
  const hardware = new HardwareHandler();
  const plugin = new PluginBridge();

  hardware.init({
    sideButtonEnabled: true,
    scrollWheelEnabled: true,
    keyboardFallback: true
  });

  console.log('Hardware handlers initialized');
  console.log('Flutter available:', plugin.isFlutterAvailable);

  // ─── Style list ───────────────────────────────────────────────────────────
  const STYLES = [
    { name: 'SIMPSONS',    prompt: 'Take a picture in the style of a Simpsons cartoon.' },
    { name: 'GHIBLI',      prompt: 'Take a picture in the Studio Ghibli anime style — soft colors, whimsical atmosphere, and hand-drawn aesthetic.' },
    { name: 'PIXAR',       prompt: 'Take a picture in the style of Pixar Animation.' },
    { name: 'MINECRAFT',   prompt: 'Take a picture in the style of Minecraft.' },
    { name: 'LEGO',        prompt: 'Take a picture and make it LEGO minifigures.' },
    { name: 'WATERCOLOR',  prompt: 'Take a picture in the style of a Watercolor painting.' },
    { name: 'CYBERPUNK',   prompt: 'Take a picture in a cyberpunk style with neon colors, tech elements, and futuristic vibes.' },
    { name: 'COMIC',       prompt: 'Take a picture and make the subject a superhero in a comic book with several frames.' },
    { name: 'FUNKO POP',   prompt: 'Take a picture and turn the subject into a Funko Pop.' },
    { name: 'WARHOL',      prompt: 'Take a picture in the style of Andy Warhol — pop art with four duplicated images in a frame.' },
    { name: 'RENAISSANCE', prompt: 'Take a picture in the style of a Renaissance Painting with depth, realism, and natural light.' },
    { name: 'WANTED',      prompt: 'Take a picture in the style of an Old West Wanted Poster. The poster title is WANTED.' },
    { name: 'TIME COVER',  prompt: 'Take a picture in the style of a polished TIME magazine cover. The title is PERSON OF THE YEAR.' },
    { name: 'SOUTH PARK',  prompt: 'Take a picture in the style of a South Park cartoon.' },
    { name: 'PERFECT',     prompt: 'Take a picture and make it picture perfect — improve lighting, colors, and overall composition. Make it photorealistic. 8k resolution.' },
  ];

  let styleIndex = 0;

  // ─── State ────────────────────────────────────────────────────────────────
  // 'boot'       — waiting for user to tap start
  // 'initializing' — camera is loading
  // 'live'       — camera is showing, ready to shoot
  // 'sending'    — captured, sending to bridge, spinner up
  // 'processing' — bridge confirmed receipt, spinner still up
  // 'done'       — complete (or timed out), reset available
  // 'error'      — error occurred
  let state = 'boot';

  // ─── DOM refs ─────────────────────────────────────────────────────────────
  const appEl       = document.getElementById('app');
  const bootScreen  = document.getElementById('boot-screen');
  const bootButton  = document.getElementById('boot-button');
  const videoEl     = document.getElementById('video');
  const previewEl   = document.getElementById('preview');
  const overlayEl   = document.getElementById('overlay');
  const overlayText = document.getElementById('overlay-text');
  const styleNameEl = document.getElementById('style-name');
  const statusEl    = document.getElementById('status');
  const btnReset    = document.getElementById('btn-reset');

  // ─── UI helpers ───────────────────────────────────────────────────────────
  function setState(s) {
    state = s;
    console.log('State changed to:', s);
    switch (s) {
      case 'boot':
        bootScreen.style.display = 'flex';
        videoEl.style.display = 'none';
        previewEl.style.display = 'none';
        overlayEl.classList.remove('visible');
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#222';
        setStatus('tap to start');
        break;
      case 'initializing':
        bootScreen.style.display = 'flex';
        bootButton.disabled = true;
        setStatus('loading camera…');
        break;
      case 'live':
        bootScreen.style.display = 'none';
        videoEl.style.display = 'block';
        previewEl.style.display = 'none';
        overlayEl.classList.remove('visible');
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#222';
        setStatus('▲�� change style · side btn shoot');
        break;
      case 'sending':
        videoEl.style.display = 'none';
        previewEl.style.display = 'block';
        overlayEl.classList.add('visible');
        overlayText.textContent = 'Sending to r1…';
        btnReset.classList.remove('visible');
        appEl.style.borderColor = '#884400';
        setStatus('sending…');
        break;
      case 'processing':
        overlayText.textContent = 'r1 is transforming…';
        appEl.style.borderColor = '#334499';
        setStatus('processing on device…');
        break;
      case 'done':
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#226622';
        setStatus('done · result in r1 gallery');
        break;
      case 'error':
        overlayEl.classList.remove('visible');
        btnReset.classList.add('visible');
        appEl.style.borderColor = '#662222';
        break;
    }
  }

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  function updateStyleLabel() {
    styleNameEl.textContent = STYLES[styleIndex].name;
  }

  // ─── Enumerate cameras ────────────────────────────────────────────────────
  async function enumerateDevices() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter(d => d.kind === 'videoinput');
      console.log('Available cameras:', cameras.length);
      return cameras;
    } catch (err) {
      console.error('Error enumerating cameras:', err);
      return [];
    }
  }

  function getCameraConstraints(cameraIndex = 0, availableCameras = []) {
    return {
      video: {
        ...(availableCameras.length > 0 ? { deviceId: { exact: availableCameras[cameraIndex].deviceId } } : { facingMode: 'environment' }),
        width: { min: 640, ideal: 1280, max: 1920 },
        height: { min: 480, ideal: 720, max: 1080 },
        aspectRatio: { ideal: 16 / 9 }
      }
    };
  }

  // ─── Initialize camera ────────────────────────────────────────────────────
  let cameraStream = null;
  let cameraIndex = 0;
  let availableCameras = [];

  async function initializeCamera() {
    if (state !== 'initializing') return;

    try {
      console.log('Enumerating cameras...');
      availableCameras = await enumerateDevices();
      cameraIndex = 0;

      console.log('Getting user media...');
      const constraints = getCameraConstraints(cameraIndex, availableCameras);
      cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
      videoEl.srcObject = cameraStream;

      console.log('Waiting for video metadata...');
      await new Promise(resolve => {
        videoEl.onloadedmetadata = async () => {
          try {
            console.log('Playing video...');
            await videoEl.play();
            console.log('Video playing, waiting for stream to stabilize...');
            setTimeout(resolve, 100);  // ← CRITICAL: Give stream time to stabilize
          } catch (err) {
            console.error('Video play error:', err);
            resolve();
          }
        };
      });

      console.log('Camera initialized successfully');
      updateStyleLabel();
      setState('live');

      // Setup plugin message handler AFTER camera is ready
      plugin.onPluginMessage(data => {
        console.log('Received plugin message:', data);
        if (data && data.status === 'processing') {
          setState('processing');
        } else if (data && data.status === 'complete') {
          setState('done');
        } else if (data && data.error) {
          setStatus('error: ' + data.error);
          setState('error');
        }
      });

      plugin.isFlutterAvailable && plugin.sendData({
        status: 'camera_ready',
        availableCameras: availableCameras.length,
        timestamp: Date.now()
      });

    } catch (err) {
      console.error('Camera access error:', err);
      setStatus('camera error: ' + err.message);
      appEl.style.borderColor = '#662222';
      setState('error');
      plugin.isFlutterAvailable && plugin.sendData({
        status: 'camera_error',
        error: err.message,
        timestamp: Date.now()
      });
    }
  }

  // ─── Boot app (triggered by user tap) ─────────────────────────────────────
  async function bootApp() {
    if (state !== 'boot') return;
    setState('initializing');
    await initializeCamera();
  }

  // ─── Capture & send ───────────────────────────────────────────────────────
  function shoot() {
    if (state !== 'live') {
      console.log('Cannot shoot in state:', state);
      return;
    }

    if (!cameraStream || !videoEl.videoWidth) {
      console.log('Camera stream not ready');
      setStatus('camera not ready');
      return;
    }

    console.log('Shooting...');
    // Capture full resolution frame
    const canvas = document.createElement('canvas');
    canvas.width  = videoEl.videoWidth  || 640;
    canvas.height = videoEl.videoHeight || 480;
    canvas.getContext('2d').drawImage(videoEl, 0, 0);

    const dataUri = canvas.toDataURL('image/jpeg', 0.8);

    // Show freeze-frame as preview
    previewEl.src = dataUri;
    setState('sending');

    const style = STYLES[styleIndex];

    // Register response handler BEFORE sending
    let fallbackTimer = null;
    window.onPluginMessage = function(data) {
      console.log('onPluginMessage received:', data);
      if (data && data.status === 'processing') {
        setState('processing');
      } else if (data && data.status === 'complete') {
        if (fallbackTimer) clearTimeout(fallbackTimer);
        setState('done');
      } else if (data && data.error) {
        if (fallbackTimer) clearTimeout(fallbackTimer);
        setStatus('error: ' + data.error);
        setState('error');
      }
    };

    // Also listen via CustomEvent
    function onCustomEvent(e) {
      window.onPluginMessage && window.onPluginMessage(e.detail);
      window.removeEventListener('pluginMessage', onCustomEvent);
    }
    window.addEventListener('pluginMessage', onCustomEvent);

    // Send to bridge
    if (plugin.isFlutterAvailable) {
      console.log('Sending to plugin bridge...');
      plugin.sendPluginMessage({
        message: style.prompt,
        pluginId: 'com.r1.pixelart',
        imageBase64: dataUri
      });
    } else {
      // Desktop simulation
      console.log('Desktop mode: simulating plugin response');
      setTimeout(() => { window.onPluginMessage({ status: 'processing' }); }, 600);
      setTimeout(() => { window.onPluginMessage({ status: 'complete' }); }, 3000);
    }

    // Fallback timeout
    fallbackTimer = setTimeout(() => {
      if (state === 'sending' || state === 'processing') {
        console.log('Fallback timeout reached, marking as done');
        setState('done');
        setStatus('sent · result in r1 gallery');
      }
    }, 15000);
  }

  // ─── Reset to live camera ─────────────────────────────────────────────────
  function reset() {
    console.log('Resetting to live camera');
    window.onPluginMessage = null;
    setState('live');
  }

  // ─── Style cycling ────────────────────────────────────────────────────────
  function nextStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex + 1) % STYLES.length;
    updateStyleLabel();
    setStatus(`${STYLES[styleIndex].name} · side btn to shoot`);
  }

  function prevStyle() {
    if (state !== 'live') return;
    styleIndex = (styleIndex - 1 + STYLES.length) % STYLES.length;
    updateStyleLabel();
    setStatus(`${STYLES[styleIndex].name} · side btn to shoot`);
  }

  // ─── Hardware event handlers ──────────────────────────────────────────────
  hardware.on('sideButton', () => {
    console.log('Side button pressed, state:', state);
    if (state === 'boot') {
      bootApp();
    } else if (state === 'live') {
      shoot();
    } else if (previewEl.style.display === 'block') {
      reset();
    }
  });

  hardware.on('scrollWheel', e => {
    console.log('Scroll wheel:', e.direction, 'state:', state);
    if (state !== 'live') return;
    if (e.direction === 'up') {
      prevStyle();
    } else if (e.direction === 'down') {
      nextStyle();
    }
  });

  // ─── Touch events ─────────────────────────────────────────────────────────
  document.body.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.target;
    console.log('Touch on:', t.id || t.tagName);

    if (t.id === 'boot-button' || t.closest('#boot-button')) {
      bootApp();
    } else if (t === videoEl && state === 'live') {
      shoot();
    } else if (t === previewEl) {
      reset();
    } else if (t.id === 'btn-reset' || t.closest('#btn-reset')) {
      reset();
    } else if (t.id === 'arr-up') {
      prevStyle();
    } else if (t.id === 'arr-down') {
      nextStyle();
    }
  }, { passive: false });

  // ─── Click fallbacks for desktop ──────────────────────────────────────────
  bootButton.addEventListener('click', bootApp);
  videoEl.addEventListener('click', shoot);
  btnReset.addEventListener('click', reset);
  document.getElementById('arr-up').addEventListener('click', prevStyle);
  document.getElementById('arr-down').addEventListener('click', nextStyle);

  // ─── Initialize UI on load ────────────────────────────────────────────────
  window.addEventListener('load', () => {
    console.log('Page loaded, app ready for boot');
    setState('boot');
  });

  console.log('Pixelart Cam app script loaded');
</script>
</body>
</html>
