<!DOCTYPE html>
<!--
  pixelart-cam — DIAGNOSTIC VERSION
  Do NOT use as final plugin. This version logs every single camera event
  so we can see exactly where initialization stalls on rabbitOS.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cam Diagnostic </title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px; height: 282px;
      overflow: hidden;
      background: #0a0a0a;
      color: #0f0;
      font-family: monospace;
      font-size: 9px;
    }
    #app {
      width: 240px; height: 282px;
      display: flex; flex-direction: column;
    }
    /* Small video preview in corner so we can see if it ever shows */
    #video {
      position: absolute;
      top: 0; right: 0;
      width: 80px; height: 60px;
      object-fit: cover;
      z-index: 10;
      border: 1px solid #333;
      background: #111;
    }
    /* Scrollable log takes up most of screen */
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
      padding-right: 85px; /* leave room for video corner */
    }
    .entry {
      margin-bottom: 2px;
      padding: 2px 3px;
      border-radius: 2px;
      word-break: break-all;
      line-height: 1.4;
    }
    .ok   { color: #4f4; }
    .err  { color: #f44; background: #200; }
    .info { color: #888; }
    .evt  { color: #4af; }
    .warn { color: #fa4; }
    /* Bottom bar with action buttons */
    #bar {
      height: 44px;
      flex-shrink: 0;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 4px;
    }
    .btn {
      flex: 1;
      height: 34px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      color: #aaa;
      font-family: monospace;
      font-size: 8px;
      cursor: pointer;
      text-align: center;
      line-height: 1.2;
      padding: 4px 2px;
    }
    .btn:active { background: #333; }
  </style>
</head>
<body>
<div id="app">
  <div id="log">
    <div class="entry info">DIAGNOSTIC READY</div>
    <div class="entry info">Tap buttons below to test each step</div>
  </div>
  <video id="video" playsinline></video>
  <div id="bar">
    <button class="btn" id="btn-gum">1. getUserMedia</button>
    <button class="btn" id="btn-play">2. play()</button>
    <button class="btn" id="btn-shoot">3. shoot</button>
    <button class="btn" id="btn-clr">CLR</button>
  </div>
</div>
<script>
  var videoEl = document.getElementById('video');
  var logEl   = document.getElementById('log');
  var stream  = null;

  function log(msg, cls) {
    var d = document.createElement('div');
    d.className = 'entry ' + (cls || 'info');
    d.textContent = '[' + (new Date()).toLocaleTimeString() + '] ' + msg;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  // ── Log every possible video element event ────────────────────────────────
  var videoEvents = [
    'loadstart','durationchange','loadedmetadata','loadeddata',
    'progress','canplay','canplaythrough','playing','waiting',
    'seeking','seeked','ended','emptied','stalled','suspend',
    'abort','error','play','pause'
  ];
  videoEvents.forEach(function(ev) {
    videoEl.addEventListener(ev, function() {
      var extra = '';
      if (ev === 'error' && videoEl.error) {
        extra = ' code=' + videoEl.error.code + ' msg=' + videoEl.error.message;
      }
      if (ev === 'loadedmetadata') {
        extra = ' ' + videoEl.videoWidth + 'x' + videoEl.videoHeight;
      }
      log('video:' + ev + extra, ev === 'error' ? 'err' : ev === 'playing' ? 'ok' : 'evt');
    });
  });

  // ── Button 1: getUserMedia ────────────────────────────────────────────────
  document.getElementById('btn-gum').addEventListener('touchstart', function(e) {
    e.preventDefault();
    log('calling getUserMedia…', 'info');
    log('mediaDevices exists: ' + !!navigator.mediaDevices, 'info');
    log('getUserMedia exists: ' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia), 'info');

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      log('getUserMedia NOT available!', 'err');
      return;
    }

    navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:      { ideal: 640 },
        height:     { ideal: 480 }
      }
    })
    .then(function(s) {
      stream = s;
      var tracks = s.getVideoTracks();
      log('stream OK, tracks: ' + tracks.length, 'ok');
      if (tracks.length > 0) {
        var settings = tracks[0].getSettings ? tracks[0].getSettings() : {};
        log('track: ' + JSON.stringify(settings).substring(0, 80), 'ok');
      }
      log('assigning srcObject…', 'info');
      videoEl.srcObject = s;
      log('srcObject assigned', 'ok');
      log('readyState: ' + videoEl.readyState, 'info');
      log('paused: ' + videoEl.paused, 'info');
    })
    .catch(function(err) {
      log('getUserMedia FAILED', 'err');
      log('name: ' + err.name, 'err');
      log('msg: ' + err.message, 'err');
    });
  }, { passive: false });

  // ── Button 2: play() ─────────────────────────────────────────────────────
  document.getElementById('btn-play').addEventListener('touchstart', function(e) {
    e.preventDefault();
    log('calling play()…', 'info');
    log('srcObject set: ' + !!videoEl.srcObject, 'info');
    log('readyState: ' + videoEl.readyState, 'info');
    log('paused: ' + videoEl.paused, 'info');

    var result = videoEl.play();
    log('play() returned: ' + (result === undefined ? 'undefined' : typeof result), 'info');

    if (result && typeof result.then === 'function') {
      result.then(function() {
        log('play() Promise RESOLVED', 'ok');
        log('paused after: ' + videoEl.paused, 'info');
        log('videoWidth: ' + videoEl.videoWidth, 'info');
      }).catch(function(err) {
        log('play() Promise REJECTED', 'err');
        log('name: ' + err.name, 'err');
        log('msg: ' + err.message, 'err');
      });
    }
  }, { passive: false });

  // ── Button 3: shoot ───────────────────────────────────────────────────────
  document.getElementById('btn-shoot').addEventListener('touchstart', function(e) {
    e.preventDefault();
    log('shoot attempt…', 'info');
    log('videoWidth: ' + videoEl.videoWidth, 'info');
    log('videoHeight: ' + videoEl.videoHeight, 'info');
    log('readyState: ' + videoEl.readyState, 'info');
    log('paused: ' + videoEl.paused, 'info');

    if (!videoEl.videoWidth) {
      log('no video dimensions — camera not live', 'warn');
      return;
    }
    var canvas = document.createElement('canvas');
    canvas.width  = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;
    canvas.getContext('2d').drawImage(videoEl, 0, 0);
    var dataUri = canvas.toDataURL('image/jpeg', 0.8);
    log('captured ' + canvas.width + 'x' + canvas.height, 'ok');
    log('dataUri length: ' + dataUri.length, 'ok');
  }, { passive: false });

  // ── Clear log ─────────────────────────────────────────────────────────────
  document.getElementById('btn-clr').addEventListener('touchstart', function(e) {
    e.preventDefault();
    logEl.innerHTML = '';
    log('log cleared', 'info');
  }, { passive: false });

  // ── Log hardware events ───────────────────────────────────────────────────
  window.addEventListener('sideClick',      function() { log('HW: sideClick', 'evt'); });
  window.addEventListener('longPressStart', function() { log('HW: longPressStart', 'evt'); });
  window.addEventListener('longPressEnd',   function() { log('HW: longPressEnd', 'evt'); });
  window.addEventListener('scrollUp',       function() { log('HW: scrollUp', 'evt'); });
  window.addEventListener('scrollDown',     function() { log('HW: scrollDown', 'evt'); });

  // ── Boot log ──────────────────────────────────────────────────────────────
  log('isR1: ' + (typeof PluginMessageHandler !== 'undefined'), 'info');
  log('userAgent: ' + navigator.userAgent.substring(0, 60), 'info');
</script>
</body>
</html>
